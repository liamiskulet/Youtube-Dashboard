<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8" />

<meta
    name="viewport"
    content="width=device-width,
    initial-scale=1.0,
    viewport-fit=cover"
/>

<title>Anime Shorts Feed</title>

<style>

/* =========================
   RESET
========================= */

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

html,
body{
    width:100%;
    height:100%;
    overflow:hidden;
    background:#000;
    font-family:
        Inter,
        -apple-system,
        BlinkMacSystemFont,
        "Segoe UI",
        sans-serif;
}

/* =========================
   APP
========================= */

#app{
    width:100%;
    height:100%;
    position:relative;
    overflow:hidden;
}

/* =========================
   FEED
========================= */

#feed{
    height:100vh;
    overflow-y:scroll;
    scroll-snap-type:y mandatory;
    -webkit-overflow-scrolling:touch;
    overscroll-behavior-y:contain;
}

.video-section{
    position:relative;
    width:100%;
    height:100vh;
    background:#000;
    overflow:hidden;
    scroll-snap-align:start;
}

/* =========================
   PLAYER
========================= */

.player-shell{
    position:absolute;
    inset:0;
    overflow:hidden;
    background:#000;
}

.player-shell iframe{
    position:absolute;
    top:50%;
    left:50%;

    width:56.25vh;
    height:100vh;

    transform:translate(-50%,-50%);

    border:none;
    pointer-events:none;
}

/* Taller phones */
@media (max-aspect-ratio:9/16){

    .player-shell iframe{
        width:100vw;
        height:177.78vw;
    }

}

/* =========================
   GRADIENT OVERLAYS
========================= */

.top-gradient{
    position:absolute;
    top:0;
    left:0;
    right:0;
    height:140px;
    z-index:2;

    background:
        linear-gradient(
            to bottom,
            rgba(0,0,0,.7),
            transparent
        );
}

.bottom-gradient{
    position:absolute;
    left:0;
    right:0;
    bottom:0;
    height:45%;
    z-index:2;

    background:
        linear-gradient(
            to top,
            rgba(0,0,0,.95),
            rgba(0,0,0,.6),
            transparent
        );
}

/* =========================
   TAP FOR SOUND
========================= */

.sound-overlay{
    position:fixed;
    top:22px;
    left:50%;
    transform:translateX(-50%);

    z-index:9999;

    padding:12px 18px;

    border-radius:999px;

    background:
        rgba(255,255,255,.12);

    border:
        1px solid rgba(255,255,255,.15);

    backdrop-filter:blur(20px);

    color:white;

    font-size:14px;
    font-weight:600;

    letter-spacing:.2px;

    box-shadow:
        0 10px 40px rgba(0,0,0,.35);

    transition:
        opacity .45s ease,
        transform .45s ease;

    pointer-events:none;
}

.sound-overlay.hidden{
    opacity:0;
    transform:
        translateX(-50%)
        translateY(-15px);
}

/* =========================
   VIDEO INFO
========================= */

.meta{
    position:absolute;
    left:16px;
    bottom:95px;

    width:calc(100% - 110px);

    z-index:5;

    color:white;
}

.channel{
    font-size:14px;
    font-weight:600;

    margin-bottom:10px;

    opacity:.92;
}

.title{
    font-size:17px;
    line-height:1.45;
    font-weight:700;

    display:-webkit-box;

    -webkit-line-clamp:2;
    -webkit-box-orient:vertical;

    overflow:hidden;

    text-shadow:
        0 2px 12px rgba(0,0,0,.8);
}

/* =========================
   SIDEBAR
========================= */

.sidebar{
    position:absolute;

    right:12px;
    bottom:95px;

    z-index:5;

    display:flex;
    flex-direction:column;
    gap:18px;
}

.action{
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:7px;

    user-select:none;
}

.action-btn{
    width:56px;
    height:56px;

    border-radius:50%;

    display:flex;
    align-items:center;
    justify-content:center;

    background:
        rgba(255,255,255,.12);

    border:
        1px solid rgba(255,255,255,.15);

    backdrop-filter:blur(18px);

    font-size:25px;

    box-shadow:
        0 8px 24px rgba(0,0,0,.35);

    transition:
        transform .15s ease,
        background .15s ease;
}

.action-btn:active{
    transform:scale(.9);
    background:
        rgba(255,255,255,.18);
}

.action-label{
    font-size:12px;
    font-weight:600;

    color:white;

    text-shadow:
        0 2px 10px rgba(0,0,0,.7);
}

/* =========================
   LOADER
========================= */

.loader-screen{
    width:100%;
    height:100vh;

    display:flex;
    align-items:center;
    justify-content:center;

    background:#000;
}

.loader{
    width:58px;
    height:58px;

    border-radius:50%;

    border:
        4px solid rgba(255,255,255,.15);

    border-top:
        4px solid white;

    animation:
        spin .8s linear infinite;
}

@keyframes spin{

    to{
        transform:rotate(360deg);
    }

}

/* =========================
   ERROR
========================= */

.error{
    width:100%;
    height:100vh;

    display:flex;
    align-items:center;
    justify-content:center;

    color:white;

    padding:30px;

    text-align:center;

    font-size:18px;
}

</style>
</head>

<body>

<div id="app">

    <div
        class="sound-overlay"
        id="soundOverlay"
    >
        Tap Screen for Sound 🔊
    </div>

    <div id="feed">

        <div class="loader-screen">
            <div class="loader"></div>
        </div>

    </div>

</div>

<script src="https://www.youtube.com/iframe_api"></script>

<script>

/* =========================
   CONFIG
========================= */

const API_KEY =
    "AIzaSyBeL88mCyBYNZAnxPQ4sExqTo1HjTjQ_Oc";

const SEARCH_QUERY =
    "anime edits";

const MAX_RESULTS = 50;

/* =========================
   GLOBAL STATE
========================= */

const feed =
    document.getElementById("feed");

const soundOverlay =
    document.getElementById("soundOverlay");

const players = [];

let activeIndex = -1;

let hasUserInteracted = false;

let globalMuted = true;

/* =========================
   FETCH VIDEOS
========================= */

async function fetchVideos(){

    try{

        const endpoint =
            `https://www.googleapis.com/youtube/v3/search` +
            `?part=snippet` +
            `&type=video` +
            `&videoDuration=short` +
            `&maxResults=${MAX_RESULTS}` +
            `&q=${encodeURIComponent(SEARCH_QUERY)}` +
            `&key=${API_KEY}`;

        const response =
            await fetch(endpoint);

        const data =
            await response.json();

        if(!data.items?.length){

            showError("No Shorts Found");

            return;
        }

        renderFeed(data.items);

    }catch(error){

        console.error(error);

        showError("Failed to load videos");

    }

}

/* =========================
   RENDER FEED
========================= */

function renderFeed(videos){

    feed.innerHTML = "";

    videos.forEach((video,index)=>{

        const section =
            document.createElement("section");

        section.className =
            "video-section";

        section.dataset.index =
            index;

        section.innerHTML = `

            <div class="player-shell">

                <div id="player-${index}"></div>

            </div>

            <div class="top-gradient"></div>

            <div class="bottom-gradient"></div>

            <div class="meta">

                <div class="channel">
                    @${escapeHTML(
                        video.snippet.channelTitle
                    )}
                </div>

                <div class="title">
                    ${escapeHTML(
                        video.snippet.title
                    )}
                </div>

            </div>

            <div class="sidebar">

                <div class="action">

                    <div class="action-btn">
                        ❤️
                    </div>

                    <div class="action-label">
                        Like
                    </div>

                </div>

                <div class="action">

                    <div class="action-btn">
                        💬
                    </div>

                    <div class="action-label">
                        Comment
                    </div>

                </div>

                <div class="action">

                    <div class="action-btn">
                        📤
                    </div>

                    <div class="action-label">
                        Share
                    </div>

                </div>

            </div>

        `;

        feed.appendChild(section);

        players.push({
            id:video.id.videoId,
            player:null
        });

    });

    initializePlayers();

    setupIntersectionObserver();

}

/* =========================
   YOUTUBE PLAYERS
========================= */

function initializePlayers(){

    players.forEach((item,index)=>{

        item.player =
            new YT.Player(
                `player-${index}`,
                {

                videoId:item.id,

                playerVars:{

                    autoplay:0,
                    controls:0,
                    modestbranding:1,
                    rel:0,
                    fs:0,
                    playsinline:1,
                    loop:1,
                    playlist:item.id,
                    mute:1,
                    iv_load_policy:3

                },

                events:{

                    onReady:()=>{

                        if(index === 0){

                            activateVideo(0);

                        }

                    }

                }

            });

    });

}

/* =========================
   INTERSECTION OBSERVER
========================= */

function setupIntersectionObserver(){

    const sections =
        document.querySelectorAll(
            ".video-section"
        );

    const observer =
        new IntersectionObserver(
            entries=>{

            entries.forEach(entry=>{

                if(
                    entry.isIntersecting &&
                    entry.intersectionRatio > .8
                ){

                    const index =
                        Number(
                            entry.target.dataset.index
                        );

                    activateVideo(index);

                }

            });

        },{
            threshold:[0.8]
        });

    sections.forEach(section=>{

        observer.observe(section);

    });

}

/* =========================
   ACTIVATE VIDEO
========================= */

function activateVideo(index){

    if(activeIndex === index)
        return;

    activeIndex = index;

    players.forEach((item,i)=>{

        const player =
            item.player;

        if(!player?.playVideo)
            return;

        if(i === index){

            player.playVideo();

            if(globalMuted){

                player.mute();

            }else{

                player.unMute();

            }

        }else{

            player.pauseVideo();

        }

    });

}

/* =========================
   GLOBAL SOUND HANDLER
========================= */

function enableSound(){

    if(hasUserInteracted)
        return;

    hasUserInteracted = true;

    globalMuted = false;

    soundOverlay.classList.add(
        "hidden"
    );

    const activePlayer =
        players[activeIndex]?.player;

    if(activePlayer?.unMute){

        activePlayer.unMute();

    }

}

document.body.addEventListener(
    "click",
    enableSound,
    { once:true }
);

document.body.addEventListener(
    "touchstart",
    enableSound,
    { once:true }
);

/* =========================
   HELPERS
========================= */

function escapeHTML(str){

    return str.replace(
        /[&<>"']/g,
        m=>({

            '&':'&amp;',
            '<':'&lt;',
            '>':'&gt;',
            '"':'&quot;',
            "'":'&#39;'

        })[m]
    );

}

function showError(message){

    feed.innerHTML = `
        <div class="error">
            ${message}
        </div>
    `;

}

/* =========================
   YT API READY
========================= */

function onYouTubeIframeAPIReady(){

    fetchVideos();

}

</script>

</body>
</html>
