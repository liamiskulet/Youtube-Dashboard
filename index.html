<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta
    name="viewport"
    content="width=device-width, initial-scale=1.0, viewport-fit=cover"
/>

<title>Premium Personalized Shorts Feed</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

html,
body{
    width:100%;
    height:100%;
    overflow:hidden;
    background:#000;
    font-family:Inter,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
    -webkit-tap-highlight-color:transparent;
}

#app{
    position:relative;
    width:100%;
    height:100%;
    overflow:hidden;
    background:#000;
}

#feed{
    width:100%;
    height:100vh;
    overflow-y:scroll;
    scroll-snap-type:y mandatory;
    scroll-behavior:smooth;
    -webkit-overflow-scrolling:touch;
    overscroll-behavior-y:contain;
}

.video-section{
    position:relative;
    width:100%;
    height:100vh;
    background:#000;
    overflow:hidden;
    scroll-snap-align:start;
}

.player-shell{
    position:absolute;
    inset:0;
    overflow:hidden;
    background:#000;
}

.player-shell iframe{
    position:absolute;
    top:50%;
    left:50%;
    width:56.25vh;
    height:100vh;
    transform:translate(-50%,-50%);
    border:none;
    pointer-events:none;
}

@media (max-aspect-ratio:9/16){
    .player-shell iframe{
        width:100vw;
        height:177.78vw;
    }
}

.search-header{
    position:fixed;
    top:0;
    left:0;
    right:0;
    z-index:1000;
    padding:env(safe-area-inset-top) 14px 14px 14px;
    background:linear-gradient(to bottom,rgba(0,0,0,.55),transparent);
    pointer-events:none;
}

.search-shell{
    width:100%;
    max-width:650px;
    margin:0 auto;
    display:flex;
    align-items:center;
    gap:12px;
    padding:12px;
    border-radius:24px;
    pointer-events:auto;
    background:rgba(0,0,0,.40);
    backdrop-filter:blur(15px);
    border:1px solid rgba(255,255,255,.12);
    box-shadow:0 10px 40px rgba(0,0,0,.35);
}

.search-input{
    flex:1;
    border:none;
    outline:none;
    background:transparent;
    color:white;
    font-size:15px;
    font-weight:500;
    min-width:0;
}

.search-input::placeholder{
    color:rgba(255,255,255,.65);
}

.search-btn{
    width:44px;
    height:44px;
    border:none;
    border-radius:50%;
    color:white;
    cursor:pointer;
    font-size:18px;
    display:flex;
    align-items:center;
    justify-content:center;
    background:rgba(255,255,255,.10);
    backdrop-filter:blur(15px);
    border:1px solid rgba(255,255,255,.12);
}

.search-history{
    position:fixed;
    top:86px;
    left:50%;
    transform:translateX(-50%);
    width:calc(100% - 28px);
    max-width:650px;
    z-index:998;
    display:flex;
    flex-wrap:wrap;
    gap:10px;
    padding:12px;
    background:rgba(0,0,0,.32);
    backdrop-filter:blur(15px);
    border:1px solid rgba(255,255,255,.10);
    border-radius:20px;
}

.history-chip{
    border:none;
    padding:10px 14px;
    border-radius:999px;
    cursor:pointer;
    color:white;
    font-size:13px;
    font-weight:600;
    background:rgba(255,255,255,.10);
    border:1px solid rgba(255,255,255,.10);
}

.sound-overlay{
    position:fixed;
    top:150px;
    left:50%;
    transform:translateX(-50%);
    z-index:9999;
    padding:12px 18px;
    border-radius:999px;
    background:rgba(0,0,0,.40);
    backdrop-filter:blur(15px);
    border:1px solid rgba(255,255,255,.12);
    color:white;
}

.sound-overlay.hidden{
    opacity:0;
}

.scroll-controls{
    position:fixed;
    right:14px;
    top:50%;
    transform:translateY(-50%);
    z-index:999;
    display:flex;
    flex-direction:column;
    gap:14px;
}

.scroll-btn{
    width:58px;
    height:58px;
    border-radius:50%;
    border:1px solid rgba(255,255,255,.12);
    background:rgba(0,0,0,.42);
    backdrop-filter:blur(15px);
    color:white;
    cursor:pointer;
    font-size:24px;
}

.loader-screen{
    width:100%;
    height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    background:#000;
}

.loader-ring{
    width:78px;
    height:78px;
    border-radius:50%;
    border:5px solid rgba(255,255,255,.08);
    border-top:5px solid white;
    animation:spin .8s linear infinite;
}

@keyframes spin{
    to{
        transform:rotate(360deg);
    }
}

.error{
    width:100%;
    height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    color:white;
    font-size:18px;
    font-weight:700;
}

</style>
</head>

<body>

<div id="app">

    <div class="search-header">

        <div class="search-shell">

            <input
                type="text"
                id="searchInput"
                class="search-input"
                placeholder="Search shorts..."
                autocomplete="off"
                spellcheck="false"
            />

            <button
                class="search-btn"
                id="searchBtn"
            >
                🔍
            </button>

        </div>

    </div>

    <div
        class="search-history"
        id="searchHistory"
    ></div>

    <div
        class="sound-overlay"
        id="soundOverlay"
    >
        Tap Screen For Sound 🔊
    </div>

    <div class="scroll-controls">

        <button
            class="scroll-btn"
            id="scrollUp"
        >
            ↑
        </button>

        <button
            class="scroll-btn"
            id="scrollDown"
        >
            ↓
        </button>

    </div>

    <div id="feed">

        <div class="loader-screen">
            <div class="loader-ring"></div>
        </div>

    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://www.youtube.com/iframe_api"></script>

<script>

/* ==========================================
   SECURITY CONFIGURATION
========================================== */

const SUPABASE_URL =
    "https://cfmdniuossejstrywbbx.supabase.co";

const SUPABASE_ANON_KEY =
    "sb_publishable_W0tVnUX_Nju1OVAipUCoHQ_EmjUAQ7T";

const API_KEY =
    "AIzaSyBeL88mCyBYNZAnxPQ4sExqTo1HjTjQ_Oc";

const MAX_RESULTS = 50;

/* ==========================================
   SUPABASE CLIENT (GLOBAL INITIALIZATION)
========================================== */

window.supabase =
    window.supabase ||
    window.supabase.createClient(
        SUPABASE_URL,
        SUPABASE_ANON_KEY
    );

const supabase =
    window.supabase;

/* ==========================================
   ELEMENTS
========================================== */

const feed = document.getElementById("feed");
const soundOverlay = document.getElementById("soundOverlay");
const searchInput = document.getElementById("searchInput");
const searchBtn = document.getElementById("searchBtn");
const scrollUp = document.getElementById("scrollUp");
const scrollDown = document.getElementById("scrollDown");
const searchHistoryContainer = document.getElementById("searchHistory");

let currentQuery = "anime edits";
let players = [];
let observer = null;
let activeIndex = -1;
let globalMuted = true;
let hasUserInteracted = false;
let currentUser = null;

async function initializeAuth(){

    try{

        const {
            data,
            error
        } = await supabase.auth.getUser();

        if(error){
            console.warn(error.message);
            return;
        }

        currentUser = data.user || null;

    }catch(error){
        console.error(error);
    }

}

async function saveSearch(term){

    if(!currentUser)
        return;

    try{

        await supabase
            .from("search_history")
            .insert({
                user_id: currentUser.id,
                search_term: term,
                timestamp: new Date().toISOString()
            });

    }catch(error){
        console.error(error);
    }

}

async function fetchRecentSearches(){

    if(!currentUser)
        return [];

    try{

        const {
            data,
            error
        } = await supabase
            .from("search_history")
            .select("search_term, timestamp")
            .eq("user_id", currentUser.id)
            .order("timestamp", { ascending:false })
            .limit(10);

        if(error)
            return [];

        return data || [];

    }catch(error){
        console.error(error);
        return [];
    }

}

async function renderSearchHistory(){

    const history =
        await fetchRecentSearches();

    searchHistoryContainer.innerHTML = "";

    if(!history.length){
        searchHistoryContainer.style.display = "none";
        return;
    }

    searchHistoryContainer.style.display = "flex";

    const uniqueTerms =
        [...new Set(history.map(item=>item.search_term))]
        .slice(0,5);

    uniqueTerms.forEach(term=>{

        const chip = document.createElement("button");

        chip.className = "history-chip";
        chip.textContent = term;

        chip.addEventListener("click", async ()=>{

            searchInput.value = term;

            await performSearch(term,false);

        });

        searchHistoryContainer.appendChild(chip);

    });

}

async function loadPersonalizedFeed(){

    const history =
        await fetchRecentSearches();

    if(!history.length){

        await performSearch(currentQuery,false);
        return;

    }

    const uniqueTerms =
        [...new Set(history.map(item=>item.search_term))];

    const randomTerm =
        uniqueTerms[Math.floor(Math.random()*uniqueTerms.length)];

    currentQuery = randomTerm;
    searchInput.value = randomTerm;

    await performSearch(randomTerm,false);

}

async function performSearch(query,saveToHistory=true){

    currentQuery = query.trim();

    if(!currentQuery)
        return;

    cleanupPlayers();
    showLoader();

    if(saveToHistory){
        await saveSearch(currentQuery);
        await renderSearchHistory();
    }

    try{

        const endpoint =
            `https://www.googleapis.com/youtube/v3/search?part=snippet&type=video&videoDuration=short&maxResults=${MAX_RESULTS}&q=${encodeURIComponent(currentQuery)}&key=${API_KEY}`;

        const response = await fetch(endpoint);
        const data = await response.json();

        if(!data.items?.length){
            showError("No Shorts Found");
            return;
        }

        renderFeed(data.items);

    }catch(error){
        console.error(error);
        showError("Failed To Load Videos");
    }

}

function renderFeed(videos){

    feed.innerHTML = "";
    activeIndex = -1;

    players = videos.map(video => ({
        id: video.id.videoId,
        player: null,
        initialized: false,
        destroyed: false
    }));

    videos.forEach((video,index)=>{

        const section = document.createElement("section");

        section.className = "video-section";
        section.dataset.index = index;

        section.innerHTML = `
            <div class="player-shell">
                <div id="player-${index}"></div>
            </div>
        `;

        feed.appendChild(section);

    });

    setupObserver();
    activateVideo(0);

}

function loadPlayer(index){

    const item = players[index];

    if(!item || item.initialized)
        return;

    const mount = document.getElementById(`player-${index}`);

    if(!mount)
        return;

    item.initialized = true;
    item.destroyed = false;

    item.player = new YT.Player(`player-${index}`,{

        videoId:item.id,

        playerVars:{
            autoplay:0,
            controls:0,
            modestbranding:1,
            rel:0,
            fs:0,
            playsinline:1,
            loop:1,
            playlist:item.id,
            mute:1,
            iv_load_policy:3,
            enablejsapi:1,
            origin:window.location.origin
        },

        events:{

            onReady:(event)=>{

                if(index === activeIndex){

                    try{

                        event.target.playVideo();

                        if(globalMuted){
                            event.target.mute();
                        }else{
                            event.target.unMute();
                        }

                    }catch(err){}

                }

            }

        }

    });

}

function destroyPlayer(index){

    const item = players[index];

    if(!item || !item.player)
        return;

    item.destroyed = true;

    try{
        item.player.stopVideo();
    }catch(err){}

    try{
        item.player.destroy();
    }catch(err){}

    item.player = null;
    item.initialized = false;

}

function ensureSlidingWindow(centerIndex){

    const allowedIndexes = new Set([
        centerIndex - 1,
        centerIndex,
        centerIndex + 1
    ]);

    allowedIndexes.forEach(index=>{

        if(index >= 0 && index < players.length){
            loadPlayer(index);
        }

    });

    players.forEach((item,index)=>{

        if(!allowedIndexes.has(index)){
            destroyPlayer(index);
        }

    });

}

function setupObserver(){

    if(observer)
        observer.disconnect();

    observer = new IntersectionObserver(entries=>{

        entries.forEach(entry=>{

            if(entry.isIntersecting && entry.intersectionRatio >= .75){

                const index = Number(entry.target.dataset.index);
                activateVideo(index);

            }

        });

    },{
        threshold:[0.75]
    });

    document
        .querySelectorAll(".video-section")
        .forEach(section=>{
            observer.observe(section);
        });

}

function activateVideo(index){

    if(index < 0 || index >= players.length)
        return;

    if(activeIndex === index)
        return;

    activeIndex = index;

    ensureSlidingWindow(index);

    players.forEach((item,i)=>{

        if(!item || item.destroyed || !item.player)
            return;

        try{

            if(i === index){

                item.player.playVideo();

                if(globalMuted){
                    item.player.mute();
                }else{
                    item.player.unMute();
                }

            }else{
                item.player.pauseVideo();
            }

        }catch(err){}

    });

}

function cleanupPlayers(){

    if(observer){
        observer.disconnect();
        observer = null;
    }

    players.forEach((_,index)=>{
        destroyPlayer(index);
    });

    players = [];
    activeIndex = -1;

}

function showLoader(){

    feed.innerHTML = `
        <div class="loader-screen">
            <div class="loader-ring"></div>
        </div>
    `;

}

function showError(message){

    feed.innerHTML = `
        <div class="error">
            ${message}
        </div>
    `;

}

function enableSound(){

    if(hasUserInteracted)
        return;

    hasUserInteracted = true;
    globalMuted = false;

    soundOverlay.classList.add("hidden");

}

document.body.addEventListener("click",enableSound,{ once:true });
document.body.addEventListener("touchstart",enableSound,{ once:true });

async function triggerSearch(){

    const query = searchInput.value.trim();

    if(!query)
        return;

    await performSearch(query,true);

}

searchBtn.addEventListener("click",triggerSearch);

searchInput.addEventListener("keydown",async e=>{

    if(e.key === "Enter"){
        await triggerSearch();
    }

});

async function initializeApp(){

    await initializeAuth();
    await renderSearchHistory();
    await loadPersonalizedFeed();

}

function onYouTubeIframeAPIReady(){
    initializeApp();
}

</script>

</body>
</html>
```
