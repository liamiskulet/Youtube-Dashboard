<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>YouTube Dashboard</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: #0f172a;
      color: white;
      min-height: 100vh;
      padding: 40px;
      background-image:
        radial-gradient(circle at top left, rgba(99,102,241,0.15), transparent 30%),
        radial-gradient(circle at bottom right, rgba(168,85,247,0.15), transparent 30%);
    }

    .container {
      max-width: 1400px;
      margin: auto;
    }

    .header {
      margin-bottom: 30px;
    }

    .header h1 {
      font-size: 3rem;
      font-weight: 700;
      background: linear-gradient(to right, #818cf8, #c084fc);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 10px;
    }

    .header p {
      color: #94a3b8;
    }

    .search-bar {
      display: flex;
      gap: 12px;
      margin-bottom: 30px;
    }

    .search-input {
      flex: 1;
      padding: 18px;
      border-radius: 16px;
      border: 1px solid rgba(255,255,255,0.08);
      background: rgba(15,23,42,0.8);
      color: white;
      font-size: 1rem;
      outline: none;
    }

    .search-button {
      padding: 18px 28px;
      border: none;
      border-radius: 16px;
      background: linear-gradient(135deg, #6366f1, #a855f7);
      color: white;
      font-weight: 600;
      cursor: pointer;
      transition: 0.2s;
    }

    .search-button:hover {
      opacity: 0.9;
      transform: translateY(-1px);
    }

    .layout {
      display: grid;
      grid-template-columns: 1.4fr 1fr;
      gap: 28px;
    }

    .player-container {
      background: rgba(15,23,42,0.75);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 24px;
      overflow: hidden;
      backdrop-filter: blur(12px);
      height: fit-content;
    }

    .player-wrapper {
      position: relative;
      width: 100%;
      padding-top: 56.25%;
    }

    .player-wrapper iframe {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      border: none;
    }

    .video-info {
      padding: 20px;
    }

    .video-info h2 {
      font-size: 1.2rem;
      margin-bottom: 8px;
    }

    .video-info p {
      color: #94a3b8;
      font-size: 0.95rem;
    }

    .results {
      display: flex;
      flex-direction: column;
      gap: 16px;
      max-height: 80vh;
      overflow-y: auto;
      padding-right: 4px;
    }

    .video-card {
      display: flex;
      gap: 14px;
      background: rgba(15,23,42,0.75);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 18px;
      overflow: hidden;
      cursor: pointer;
      transition: 0.2s;
      backdrop-filter: blur(12px);
    }

    .video-card:hover {
      transform: translateY(-2px);
      border-color: rgba(99,102,241,0.5);
    }

    .video-thumb {
      width: 180px;
      height: 100px;
      object-fit: cover;
      flex-shrink: 0;
    }

    .video-details {
      padding: 12px 12px 12px 0;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    .video-title {
      font-size: 0.95rem;
      font-weight: 600;
      margin-bottom: 8px;
      line-height: 1.4;
    }

    .video-channel {
      color: #94a3b8;
      font-size: 0.85rem;
    }

    .empty-state {
      color: #64748b;
      text-align: center;
      padding: 60px 20px;
    }

    @media (max-width: 1000px) {
      .layout {
        grid-template-columns: 1fr;
      }

      .results {
        max-height: unset;
      }
    }

    @media (max-width: 700px) {
      body {
        padding: 20px;
      }

      .search-bar {
        flex-direction: column;
      }

      .search-button {
        width: 100%;
      }

      .video-card {
        flex-direction: column;
      }

      .video-thumb {
        width: 100%;
        height: auto;
      }
    }
  </style>
</head>
<body>

  <div class="container">

    <div class="header">
      <h1>YouTube Dashboard</h1>
      <p>Search and watch public YouTube videos directly from your dashboard.</p>
    </div>

    <div class="search-bar">
      <input
        type="text"
        id="searchInput"
        class="search-input"
        placeholder="Search YouTube videos..."
      />

      <button class="search-button" onclick="searchVideos()">
        Search
      </button>
    </div>

    <div class="layout">

      <!-- Player -->
      <div class="player-container">
        <div class="player-wrapper">
          <iframe
            id="youtubePlayer"
            src="https://www.youtube.com/embed/dQw4w9WgXcQ"
            allowfullscreen
          ></iframe>
        </div>

        <div class="video-info">
          <h2 id="playerTitle">Select a video</h2>
          <p id="playerChannel">YouTube Player</p>
        </div>
      </div>

      <!-- Results -->
      <div class="results" id="results">
        <div class="empty-state">
          Search for videos to begin.
        </div>
      </div>

    </div>
  </div>

  <script>
    // ==========================================
    // PASTE YOUR API KEY HERE
    // ==========================================
    const API_KEY = "AIzaSyBeL88mCyBYNZAnxPQ4sExqTo1HjTjQ_Oc";

    const resultsContainer = document.getElementById("results");

    async function searchVideos() {
      const query = document.getElementById("searchInput").value.trim();

      if (!query) {
        alert("Please enter a search query.");
        return;
      }

      resultsContainer.innerHTML = `
        <div class="empty-state">
          Searching YouTube...
        </div>
      `;

      try {
        const response = await fetch(
          `https://www.googleapis.com/youtube/v3/search?part=snippet&type=video&maxResults=15&q=${encodeURIComponent(query)}&key=${API_KEY}`
        );

        const data = await response.json();

        if (!data.items || data.items.length === 0) {
          resultsContainer.innerHTML = `
            <div class="empty-state">
              No results found.
            </div>
          `;
          return;
        }

        displayResults(data.items);

      } catch (error) {
        console.error(error);

        resultsContainer.innerHTML = `
          <div class="empty-state">
            Failed to load videos.
          </div>
        `;
      }
    }

    function displayResults(videos) {
      resultsContainer.innerHTML = "";

      videos.forEach(video => {
        const videoId = video.id.videoId;
        const title = video.snippet.title;
        const channel = video.snippet.channelTitle;
        const thumbnail = video.snippet.thumbnails.medium.url;

        const card = document.createElement("div");
        card.className = "video-card";

        card.innerHTML = `
          <img class="video-thumb" src="${thumbnail}" alt="${title}">

          <div class="video-details">
            <div class="video-title">${title}</div>
            <div class="video-channel">${channel}</div>
          </div>
        `;

        card.addEventListener("click", () => {
          playVideo(videoId, title, channel);
        });

        resultsContainer.appendChild(card);
      });
    }

    function playVideo(videoId, title, channel) {
      const player = document.getElementById("youtubePlayer");

      player.src = `https://www.youtube.com/embed/${videoId}?autoplay=1`;

      document.getElementById("playerTitle").textContent = title;
      document.getElementById("playerChannel").textContent = channel;
    }

    // Enter key support
    document.getElementById("searchInput").addEventListener("keydown", (e) => {
      if (e.key === "Enter") {
        searchVideos();
      }
    });
  </script>

</body>
</html>
