      function Icon({ name, className = "w-5 h-5", fill = "none" }) {
        return (
          <svg className={className} viewBox="0 0 24 24" fill={fill} stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" aria-hidden="true">
            {(ICONS[name] || []).map((d) => <path key={d} d={d} />)}
          </svg>
        );
      }

      // -----------------------------------------------------------------------
      // Recommendation helpers
      // -----------------------------------------------------------------------

      function uniqueValues(values) {
        return [...new Set(values.map((value) => value.trim()).filter(Boolean))];
      }

      function shuffle(items) {
        const copy = [...items];
        for (let index = copy.length - 1; index > 0; index -= 1) {
          const swapIndex = Math.floor(Math.random() * (index + 1));
          [copy[index], copy[swapIndex]] = [copy[swapIndex], copy[index]];
        }
        return copy;
      }

      function randomBetween(min, max) {
        return Math.floor(Math.random() * (max - min + 1)) + min;
      }

      function formatMetric(value) {
        if (value >= 1_000_000) {
          return `${(value / 1_000_000).toFixed(value >= 10_000_000 ? 0 : 1).replace(".0", "")}M`;
        }

        if (value >= 1_000) {
          return `${(value / 1_000).toFixed(value >= 100_000 ? 0 : 1).replace(".0", "")}K`;
        }

        return String(value);
      }

      function createEngagementMetrics() {
        const likes = randomBetween(50_000, 3_000_000);
        const commentsCount = randomBetween(500, 100_000);
        const shares = randomBetween(100, 50_000);
        const views = randomBetween(100_000, 20_000_000);

        return {
          likes,
          likesLabel: formatMetric(likes),
          commentsCount,
          commentsLabel: formatMetric(commentsCount),
          shares,
          sharesLabel: formatMetric(shares),
          views,
          viewsLabel: formatMetric(views),
        };
      }

      function stripCommonSearchTerms(query) {
        return query
          .toLowerCase()
          .replace(/\b(edits?|amv|phonk|shorts?|clips?|fights?|moments?|viral|best|aesthetic|transitions?)\b/g, "")
          .replace(/\s+/g, " ")
          .trim();
      }

      function generateRelatedQueries(query) {
        const cleaned = query.trim().toLowerCase().replace(/\s+/g, " ") || DEFAULT_SEARCH_QUERY;
        const subject = stripCommonSearchTerms(cleaned) || cleaned;

        return uniqueValues([
          cleaned,
          `${subject} edits`,
          `${subject} edit`,
          `${subject} amv`,
          `${subject} phonk`,
          `${subject} phonk edits`,
          `${subject} clips`,
          `${subject} fight edits`,
          `${subject} fights`,
          `${subject} moments`,
          `${subject} aesthetic edits`,
          `${subject} transitions`,
          `${subject} shorts`,
          `best ${subject} edits`,
          `viral ${subject} edits`,
        ]);
      }

      function buildSearchUrl(query, apiKey, pageToken = "") {
        const params = new URLSearchParams({
          part: "snippet",
          type: "video",
          videoDuration: "short",
          videoEmbeddable: "true",
          maxResults: String(SEARCH_BATCH_SIZE),
          q: `${query} shorts`,
          key: apiKey,
        });

        if (pageToken) params.set("pageToken", pageToken);
        return `https://www.googleapis.com/youtube/v3/search?${params.toString()}`;
      }

      function formatApiVideo(item) {
        const videoId = item?.id?.videoId;
        if (!videoId || item?.id?.kind !== "youtube#video") return null;
        if (["live", "upcoming"].includes(item?.snippet?.liveBroadcastContent)) return null;

        return {
          id: videoId,
          title: item.snippet.title,
          channel: item.snippet.channelTitle || "CreativeCreator",
          liked: false,
          ...createEngagementMetrics(),
        };
      }

      function SearchHeader({ currentQuery, onSearch, apiKey, onChangeApiKey, isLoading, isUsingFallback }) {

      function VideoSection({ video, index, isActive, shouldLoadEmbed, isMuted, onTapMedia }) {
        const [isPlaying, setIsPlaying] = useState(isActive);
        const [feedbackIcon, setFeedbackIcon] = useState(null);
        const [isBuffering, setIsBuffering] = useState(true);

        useEffect(() => {
          setIsPlaying(isActive);
          if (!isActive) return;
          setIsBuffering(true);
          const timer = setTimeout(() => setIsBuffering(false), 950);
          return () => clearTimeout(timer);
        }, [isActive]);

        function handleMediaTap() {
          const nextState = !isPlaying;
          setIsPlaying(nextState);
          setFeedbackIcon(nextState ? "play" : "pause");
          onTapMedia();
          setTimeout(() => setFeedbackIcon(null), 550);
        }

        const ytQuery = `autoplay=${isActive && isPlaying ? 1 : 0}&mute=${isMuted ? 1 : 0}&controls=0&loop=1&playlist=${video.id}&enablejsapi=1&playsinline=1&modestbranding=1&rel=0&showinfo=0&iv_load_policy=3&disablekb=1`;
        const embedUrl = `https://www.youtube.com/embed/${video.id}?${ytQuery}`;

        return (
          <div id={`video-section-${index}`} className="relative w-full h-screen bg-black overflow-hidden flex items-center justify-center snap-start">
            <div className="absolute inset-0 bg-neutral-950 pointer-events-none z-0">

            </div>

            <div className="relative w-full h-full max-w-[56.25vh] bg-black shadow-2xl flex items-center justify-center z-10 transition-all duration-500">
              {shouldLoadEmbed ? (
                <iframe
                  id={`yt-iframe-${video.id}`}
                  title={video.title}
                  src={embedUrl}
                  allow="autoplay; encrypted-media; gyroscope; picture-in-picture"
                  className="w-full h-full absolute inset-0 border-none transition-opacity duration-500 pointer-events-none"
                  loading={isActive ? "eager" : "lazy"}
                />
              ) : (
                <div className="absolute inset-0 bg-neutral-900 flex flex-col items-center justify-center">
                  <div className="w-14 h-14 rounded-full bg-white/5 border border-white/10 flex items-center justify-center animate-pulse">
                    <Icon name="play" className="w-6 h-6 text-white/50 pl-1" />
                  </div>
                </div>
              )}

              <div id={`tap-layer-${index}`} onClick={handleMediaTap} data-tap-layer="true" className="absolute inset-0 cursor-pointer z-20 select-none active:bg-white/5 transition-colors duration-100" />

              {feedbackIcon && (
                <div className="absolute inset-0 flex items-center justify-center pointer-events-none z-30 select-none">
                  <div className="w-20 h-20 rounded-full bg-black/50 border border-white/20 flex items-center justify-center text-white scale-[1.3] opacity-0 animate-ping">
                    <Icon name={feedbackIcon} className="w-8 h-8 fill-white" />
                  </div>
                </div>
              )}

              <div className="absolute top-0 inset-x-0 h-40 bg-gradient-to-b from-black/80 via-black/35 to-transparent pointer-events-none z-20" />
              <div className="absolute bottom-0 inset-x-0 h-80 bg-gradient-to-t from-black/95 via-black/50 to-transparent pointer-events-none z-20" />

              {isBuffering && isActive && (
                <div className="absolute inset-0 bg-black/20 backdrop-blur-sm flex items-center justify-center pointer-events-none z-30">
                  <Icon name="refresh" className="w-8 h-8 text-indigo-400 animate-spin" />
                </div>
              )}

              <div className="absolute left-6 bottom-8 right-16 z-30 text-white flex flex-col gap-2.5 pointer-events-none">
                <div className="flex items-center">
                  <span className="bg-gradient-to-br from-indigo-500/90 to-purple-600/90 text-white font-bold text-[10px] tracking-widest uppercase px-3.5 py-1.5 rounded-xl border border-indigo-400/20 shadow-[0_0_12px_rgba(99,102,241,0.3)] pointer-events-auto cursor-pointer flex items-center gap-1.5 transition-all active:scale-95">

      // -----------------------------------------------------------------------
      // App
      // -----------------------------------------------------------------------

      function App() {
        const [apiKey, setApiKey] = useState(() => localStorage.getItem("yt_api_key") || DEFAULT_YOUTUBE_API_KEY);
        const [videos, setVideos] = useState([]);
        const [currentQuery, setCurrentQuery] = useState(DEFAULT_SEARCH_QUERY);
        const [activeIndex, setActiveIndex] = useState(0);
        const [isMuted, setIsMuted] = useState(true);
        const [showSoundPrompt, setShowSoundPrompt] = useState(true);
        const [viewMode, setViewMode] = useState("feed");
        const [isLoading, setIsLoading] = useState(false);
        const [isUsingFallback, setIsUsingFallback] = useState(false);

const [nextPageToken, setNextPageToken] = useState("");
const [hasMoreVideos, setHasMoreVideos] = useState(true);

const [allComments, setAllComments] = useState(() => INITIAL_COMMENTS);
        const [isCommentsOpen, setIsCommentsOpen] = useState(false);
        const [toastMessage, setToastMessage] = useState(null);

        const toastTimeoutRef = useRef(null);
        const feedContainerRef = useRef(null);
        const loadedVideoIdsRef = useRef(new Set());
        const requestGenerationRef = useRef(0);
        const queryCursorRef = useRef(0);
        const apiKeyRef = useRef(apiKey);

        useEffect(() => {
          apiKeyRef.current = apiKey;
          localStorage.setItem("yt_api_key", apiKey);
        }, [apiKey]);

        function showToast(message) {
          if (toastTimeoutRef.current) clearTimeout(toastTimeoutRef.current);
          setToastMessage(message);
          toastTimeoutRef.current = window.setTimeout(() => setToastMessage(null), 2800);
        }

        async function fetchDiscoveryBatch(baseQuery, options = {}) {
          const { reset = false, generation = requestGenerationRef.current } = options;
          const relatedQueries = generateRelatedQueries(baseQuery);
          const startOffset = reset ? 0 : queryCursorRef.current;

          if (reset) {
            loadedVideoIdsRef.current = new Set();
            queryCursorRef.current = 0;
          }

          const queries = shuffle(
            Array.from({ length: SEARCH_FANOUT }, (_, index) => relatedQueries[(startOffset + index) % relatedQueries.length])
          );

          const results = await Promise.allSettled(
            queries.map(async (query) => {
              const response = await fetch(buildSearchUrl(query, apiKeyRef.current));
              const data = await response.json();
              if (data.error) throw new Error(data.error.message);
              return data.items || [];
            })
          );

          if (generation !== requestGenerationRef.current) return [];

          const successfulItems = results
            .filter((result) => result.status === "fulfilled")
            .flatMap((result) => result.value);

          if (!successfulItems.length) {
            throw new Error("YouTube API did not return any video results");
          }

          const freshVideos = [];
          for (const item of shuffle(successfulItems)) {
            const formatted = formatApiVideo(item);
            if (!formatted || loadedVideoIdsRef.current.has(formatted.id)) continue;

            loadedVideoIdsRef.current.add(formatted.id);
            freshVideos.push(formatted);
          }

          queryCursorRef.current = startOffset + SEARCH_FANOUT;
          return shuffle(freshVideos);
        }

        async function handleSearch(query) {
          const trimmedQuery = (query || DEFAULT_SEARCH_QUERY).trim() || DEFAULT_SEARCH_QUERY;
          const generation = requestGenerationRef.current + 1;
          requestGenerationRef.current = generation;

          setCurrentQuery(trimmedQuery);
          setVideos([]);
          setActiveIndex(0);
          setIsLoading(true);
          setIsUsingFallback(false);
          setViewMode("feed");
          setIsCommentsOpen(false);

          requestAnimationFrame(() => {
            if (feedContainerRef.current) feedContainerRef.current.scrollTo({ top: 0, behavior: "auto" });
          });

          try {
            const freshVideos = await fetchDiscoveryBatch(trimmedQuery, { reset: true, generation });
            if (generation !== requestGenerationRef.current) return;
            if (!freshVideos.length) throw new Error("No unique Shorts results yielded");

            setVideos(freshVideos);
            showToast(`Loaded ${freshVideos.length} ${trimmedQuery} shorts`);
          } catch (error) {
            if (generation !== requestGenerationRef.current) return;
            console.warn("YouTube discovery failed completely; using fallback stream.", error);
            const fallback = FALLBACK_VIDEOS.map((video) => ({ ...video, ...createEngagementMetrics() }));
            loadedVideoIdsRef.current = new Set(fallback.map((video) => video.id));
            setIsUsingFallback(true);
            setVideos(shuffle(fallback));
            showToast("YouTube API failed; fallback stream loaded");
          } finally {
            if (generation === requestGenerationRef.current) setIsLoading(false);
          }
        }

        async function loadMoreEndlessVideos() {
          if (isLoading || videos.length === 0) return;

          const generation = requestGenerationRef.current;
          setIsLoading(true);

          try {
            const moreVideos = await fetchDiscoveryBatch(currentQuery, { reset: false, generation });
            if (generation !== requestGenerationRef.current) return;
            if (!moreVideos.length) throw new Error("No new unique videos returned");

            setVideos((previous) => [...previous, ...moreVideos]);
            showToast(`Added ${moreVideos.length} more ${currentQuery} shorts`);
          } catch (error) {
            if (generation !== requestGenerationRef.current) return;
            console.warn("Endless recommendation loading paused after API failure.", error);
            showToast("API limit reached; recommendations paused");
          } finally {
            if (generation === requestGenerationRef.current) setIsLoading(false);
          }
        }

        useEffect(() => {
          handleSearch(DEFAULT_SEARCH_QUERY);
        }, []);

        useEffect(() => {
          if (videos.length > 0 && activeIndex >= videos.length - 6) {
            loadMoreEndlessVideos();
          }
        }, [activeIndex, videos.length]);

        useEffect(() => {
          if (viewMode !== "feed" || videos.length === 0) return;

          const observer = new IntersectionObserver(
            (entries) => {
              entries.forEach((entry) => {
                if (entry.isIntersecting && entry.intersectionRatio >= 0.6) {
                  const index = Number(entry.target.id.replace("video-section-", ""));
                  if (!Number.isNaN(index) && index !== activeIndex) setActiveIndex(index);
                }
              });
            },
            { threshold: [0.6] }
          );

          const timer = setTimeout(() => {
            videos.forEach((_, index) => {
              const element = document.getElementById(`video-section-${index}`);
              if (element) observer.observe(element);
            });
          }, 350);

          return () => {
            observer.disconnect();
            clearTimeout(timer);
          };
        }, [videos, viewMode, activeIndex]);

        function handleLikeToggle(index) {
          setVideos((previous) => {
            const clone = [...previous];
            const item = clone[index];
            if (!item) return clone;
            clone[index] = {
              ...item,
              liked: !item.liked,
              likes: item.liked ? Math.max(0, item.likes - 1) : item.likes + 1,
              likesLabel: formatMetric(item.liked ? Math.max(0, item.likes - 1) : item.likes + 1),
            };
            return clone;
          });
        }

        function handleMuteToggle() {
          setIsMuted((value) => !value);
          setShowSoundPrompt(false);
        }

        function handleGlobalInteraction() {
          if (!showSoundPrompt) return;
          setIsMuted(false);
          setShowSoundPrompt(false);
        }

        function handleShareClick(index) {
          const video = videos[index];
          if (!video) return;

          const shareUrl = `https://www.youtube.com/watch?v=${video.id}`;
          if (navigator.share) {
            navigator.share({ title: video.title, url: shareUrl }).catch(() => {});
            return;
          }

          navigator.clipboard.writeText(shareUrl).then(() => {
            showToast("Reel link copied to clipboard");
          });
        }

        function scrollIndexTo(direction) {
          const nextIndex = direction === "up" ? activeIndex - 1 : activeIndex + 1;
          if (nextIndex < 0 || nextIndex >= videos.length) return;

          const targetElement = document.getElementById(`video-section-${nextIndex}`);
          if (targetElement) {
            targetElement.scrollIntoView({ behavior: "smooth", block: "start" });
            setActiveIndex(nextIndex);
          }
        }

        function handleAddComment(videoId, text) {
          const newComment = {
            id: `comment-${Date.now()}`,
            videoId,
            username: "You",
            text,
            timestamp: "Just now",
            avatarColor: "bg-rose-500",
          };

          setAllComments((previous) => ({
            ...previous,
            [videoId]: [...(previous[videoId] || []), newComment],
          }));

          setVideos((previous) =>
            previous.map((video) =>
              video.id === videoId
                ? { ...video, commentsCount: video.commentsCount + 1, commentsLabel: formatMetric(video.commentsCount + 1) }
                : video
            )
          );
        }

        function handleSelectFromGrid(index) {
          setViewMode("feed");
          setActiveIndex(index);
          setTimeout(() => {
            const element = document.getElementById(`video-section-${index}`);
            if (element) element.scrollIntoView({ behavior: "auto", block: "start" });
          }, 150);
        }

        const activeVideo = videos[activeIndex];
        const activeCommentList = activeVideo ? allComments[activeVideo.id] || [] : [];

        return (
          <div onClick={handleGlobalInteraction} className="relative w-full h-screen bg-[#050505] text-zinc-100 overflow-hidden font-sans select-none">
            <div className="absolute inset-0 pointer-events-none opacity-[0.03] z-10" style={{ backgroundImage: "radial-gradient(#fff 1px, transparent 1px)", backgroundSize: "24px 24px" }} />

            <SearchHeader
              currentQuery={currentQuery}
              onSearch={handleSearch}
              apiKey={apiKey}
              onChangeApiKey={(value) => {
                apiKeyRef.current = value;
                setApiKey(value);
                setTimeout(() => handleSearch(currentQuery), 200);
              }}
              isLoading={isLoading}
              isUsingFallback={isUsingFallback}
            />

            {viewMode === "feed" ? (
              <div className="relative w-full h-screen pb-6">
                <div ref={feedContainerRef} className="w-full h-full overflow-y-scroll snap-y snap-mandatory scroll-smooth no-scrollbar" style={{ WebkitOverflowScrolling: "touch" }}>
                  {videos.map((video, index) => {
                    const distanceFromActive = Math.abs(index - activeIndex);
                    const shouldLoadEmbed = index === activeIndex || (index > activeIndex && index <= activeIndex + NEARBY_RENDER_DISTANCE) || distanceFromActive <= 1;

                    return (
                      <VideoSection
                        key={video.id + index}
                        video={video}
                        index={index}
                        isActive={index === activeIndex}
                        shouldLoadEmbed={shouldLoadEmbed}
                        isMuted={isMuted}
                        onTapMedia={handleMuteToggle}
                      />
                    );
                  })}
                </div>

                <div className="absolute left-6 top-1/2 -translate-y-1/2 z-30 hidden md:flex flex-col gap-4">
                  <button
                    onClick={() => scrollIndexTo("up")}
                    disabled={activeIndex === 0}
                    title="Previous Reel"
                    className="w-12 h-12 rounded-xl bg-zinc-900/40 border border-white/5 text-zinc-400 hover:text-white hover:border-indigo-500/50 flex items-center justify-center cursor-pointer transition-all disabled:opacity-30 disabled:cursor-not-allowed"
                  >
                    <Icon name="chevronUp" className="w-5 h-5" />
                  </button>
                  <div className="text-center font-mono text-xs font-bold text-zinc-500 py-1">
                    {activeIndex + 1} / {videos.length}
                  </div>
                  <button
                    onClick={() => scrollIndexTo("down")}
                    disabled={activeIndex === videos.length - 1}
                    title="Next Reel"
                    className="w-12 h-12 rounded-xl bg-zinc-900/40 border border-white/5 text-zinc-400 hover:text-white hover:border-indigo-500/50 flex items-center justify-center cursor-pointer transition-all disabled:opacity-30 disabled:cursor-not-allowed"
                  >
                    <Icon name="chevronDown" className="w-5 h-5" />
                  </button>
                </div>

                {activeVideo && (
                  <Sidebar
                    video={activeVideo}
                    index={activeIndex}
                    onLikeToggle={() => handleLikeToggle(activeIndex)}
                    onOpenComments={() => setIsCommentsOpen(true)}
                    onShare={() => handleShareClick(activeIndex)}
                    isMuted={isMuted}
                    onMuteToggle={handleMuteToggle}
                    viewMode={viewMode}
                    onViewModeToggle={() => setViewMode("grid")}
                  />
                )}
              </div>
            ) : (
              <GridExplorer videos={videos} onSelectVideo={handleSelectFromGrid} currentQuery={currentQuery} />
            )}

            {activeVideo && (
              <CommentPanel
                isOpen={isCommentsOpen}
                onClose={() => setIsCommentsOpen(false)}
                videoId={activeVideo.id}
                videoTitle={activeVideo.title}
                comments={activeCommentList}
                onAddComment={handleAddComment}
              />
            )}

            {showSoundPrompt && (
              <div
                onClick={handleMuteToggle}
                className="fixed bottom-24 left-1/2 -translate-x-1/2 z-30 px-5 py-3 rounded-xl bg-gradient-to-r from-indigo-500 to-purple-600 hover:from-indigo-600 hover:to-purple-700 text-white font-bold text-xs shadow-xl shadow-indigo-500/20 backdrop-blur-md flex items-center gap-2 border border-indigo-400/20 cursor-pointer animate-bounce group"
              >
                <Icon name="volume" className="w-4 h-4 animate-pulse group-hover:scale-110 transition-transform text-teal-300" />
                <span className="tracking-widest font-mono text-[10px] uppercase">Activate Audio Node</span>
              </div>
            )}

            <footer className="fixed bottom-0 left-0 right-0 h-6 bg-indigo-600 text-white flex items-center overflow-hidden z-40 select-none pointer-events-none">
              <div className="flex gap-16 whitespace-nowrap text-[9px] font-bold uppercase tracking-[0.25em] animate-marquee">
                <span>Critical Update: Neural Core v2.4 initialized...</span>
                <span>System Status: Optimal...</span>
                <span>All visual nodes green...</span>
                <span>Latency: 12ms / Stable...</span>
                <span>Active curations synced...</span>
                <span>Critical Update: Neural Core v2.4 initialized...</span>
                <span>System Status: Optimal...</span>
                <span>Ready for command.</span>
              </div>
            </footer>

            {toastMessage && (
              <div className="fixed bottom-10 left-1/2 -translate-x-1/2 z-50 px-5 py-3 rounded-xl bg-zinc-900/95 text-zinc-100 border border-white/10 shadow-2xl flex items-center gap-2 font-semibold text-xs tracking-wider">
                <Icon name="sparkles" className="w-3.5 h-3.5 text-indigo-400" />
                <span>{toastMessage}</span>
              </div>
            )}
          </div>
        );
      }

      ReactDOM.createRoot(document.getElementById("root")).render(
        <React.StrictMode>
          <App />
        </React.StrictMode>
      );
    </script>
  </body>
</html>
