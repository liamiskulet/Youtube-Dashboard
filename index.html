<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>Shorts Feed</title>

<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }

    html, body {
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #000;
        font-family: Arial, sans-serif;
        color: white;
    }

    #feed {
        height: 100vh;
        overflow-y: scroll;
        scroll-snap-type: y mandatory;
        -webkit-overflow-scrolling: touch;
    }

    .video-section {
        position: relative;
        width: 100%;
        height: 100vh;
        scroll-snap-align: start;
        overflow: hidden;
        background: black;
        display: flex;
        justify-content: center;
        align-items: center;
    }

    .video-wrapper {
        position: relative;
        width: 100vw;
        height: 100vh;
        overflow: hidden;
        background: #000;
    }

    /* Fixed CSS Selectors below */
    .iframe-actor iframe {
        position: absolute;
        top: 50%;
        left: 50%;
        width: 56.25vh;
        height: 100vh;
        transform: translate(-50%, -50%);
        border: none;
        pointer-events: none;
    }

    @media (max-aspect-ratio: 9/16) {
        .iframe-actor iframe {
            width: 100vw;
            height: 177.78vw;
        }
    }

    .overlay {
        position: absolute;
        bottom: 70px;
        left: 15px;
        z-index: 5;
        max-width: 70%;
        text-shadow: 0 0 6px rgba(0,0,0,0.9);
    }

    .title {
        font-size: 17px;
        font-weight: bold;
        margin-bottom: 6px;
    }

    .channel {
        font-size: 14px;
        opacity: 0.9;
    }

    .sidebar {
        position: absolute;
        right: 10px;
        bottom: 90px;
        display: flex;
        flex-direction: column;
        gap: 20px;
        z-index: 5;
    }

    .icon-btn {
        display: flex;
        flex-direction: column;
        align-items: center;
        font-size: 14px;
        text-shadow: 0 0 5px rgba(0,0,0,0.8);
    }

    .icon {
        font-size: 28px;
        margin-bottom: 4px;
    }

    .loading {
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        color: white;
        font-size: 20px;
    }
</style>
</head>

<body>

<div id="feed">
    <div class="loading">Loading Shorts...</div>
</div>

<script src="https://www.youtube.com/iframe_api"></script>

<script>
/* =========================
   CONFIG
========================= */

const API_KEY = "AIzaSyBeL88mCyBYNZAnxPQ4sExqTo1HjTjQ_Oc";

const SEARCH_QUERY = "anime edits";

const MAX_RESULTS = 12;

/* =========================
   GLOBALS
========================= */

const feed = document.getElementById("feed");

let players = [];
let currentPlaying = -1;

/* =========================
   FETCH SHORTS
========================= */

async function fetchShorts() {

    const url =
        `https://www.googleapis.com/youtube/v3/search` +
        `?part=snippet` +
        `&type=video` +
        `&videoDuration=short` +
        `&maxResults=${MAX_RESULTS}` +
        `&q=${encodeURIComponent(SEARCH_QUERY)}` +
        `&key=${API_KEY}`;

    try {

        const response = await fetch(url);
        const data = await response.json();

        if (!data.items || !data.items.length) {
            feed.innerHTML = `
                <div class="loading">
                    No Shorts Found
                </div>
            `;
            return;
        }

        renderFeed(data.items);

    } catch (err) {
        console.error(err);

        feed.innerHTML = `
            <div class="loading">
                API Error
            </div>
        `;
    }
}

/* =========================
   RENDER FEED
========================= */

function renderFeed(videos) {

    feed.innerHTML = "";

    videos.forEach((video, index) => {

        const videoId = video.id.videoId;

        const section = document.createElement("section");
        section.className = "video-section";

        /* Cleaned HTML template with iframe-actor wrapper built in */
        section.innerHTML = `
            <div class="video-wrapper">

                <div class="iframe-actor">
                    <div id="player-${index}"></div>
                </div>

                <div class="overlay">
                    <div class="title">
                        ${escapeHTML(video.snippet.title)}
                    </div>

                    <div class="channel">
                        @${escapeHTML(video.snippet.channelTitle)}
                    </div>
                </div>

                <div class="sidebar">
                    <div class="icon-btn">
                        <div class="icon">❤️</div>
                        <div>Like</div>
                    </div>

                    <div class="icon-btn">
                        <div class="icon">📤</div>
                        <div>Share</div>
                    </div>
                </div>

            </div>
        `;

        feed.appendChild(section);

        players.push({
            videoId,
            player: null
        });
    });

    initializePlayers();
    setupObserver();
}

/* =========================
   YOUTUBE IFRAME PLAYERS
========================= */

function initializePlayers() {

    players.forEach((item, index) => {

        item.player = new YT.Player(`player-${index}`, {

            videoId: item.videoId,

            playerVars: {
                autoplay: 0,
                controls: 0,
                modestbranding: 1,
                rel: 0,
                fs: 0,
                playsinline: 1,
                loop: 1,
                playlist: item.videoId,
                mute: 1
            },

            events: {
                onReady: (event) => {
                    if (index === 0) {
                        playVideo(index);
                    }
                }
            }
        });
    });
}

/* =========================
   AUTOPLAY ON SCROLL
========================= */

function setupObserver() {

    const sections = document.querySelectorAll(".video-section");

    const observer = new IntersectionObserver((entries) => {

        entries.forEach(entry => {

            if (entry.isIntersecting && entry.intersectionRatio > 0.75) {

                const index =
                    [...sections].indexOf(entry.target);

                playVideo(index);
            }
        });

    }, {
        threshold: [0.75]
    });

    sections.forEach(section => {
        observer.observe(section);
    });
}

/* =========================
   PLAY / PAUSE
========================= */

function playVideo(index) {

    if (currentPlaying === index) return;

    players.forEach((item, i) => {

        if (!item.player || !item.player.playVideo) return;

        if (i === index) {
            
            // This safely forces the active video to unmute right as it plays
            if (typeof item.player.unMute === 'function') {
                item.player.unMute();
            }
            
            item.player.playVideo();

        } else {

            item.player.pauseVideo();
        }
    });

    currentPlaying = index;
}

function playVideo(index) {

    if (currentPlaying === index) return;

    players.forEach((item, i) => {

        if (!item.player || !item.player.playVideo) return;

        if (i === index) {

            item.player.playVideo();

        } else {

            item.player.pauseVideo();
        }
    });

    currentPlaying = index;
}

/* =========================
   HELPERS
========================= */

function escapeHTML(str) {
    return str.replace(/[&<>"']/g, function(m) {
        return ({
            '&': '&amp;',
            '<': '&lt;',
            '>': '&gt;',
            '"': '&quot;',
            "'": '&#39;'
        })[m];
    });
}

/* =========================
   CLEAN INITIALIZATION
========================= */

// This function is automatically called by the YouTube Iframe API script when it's fully ready
function onYouTubeIframeAPIReady() {
    fetchShorts();
}

// Fallback safety catch: If the script loaded out of order or was cached, kickstart it anyway
window.addEventListener('load', () => {
    if (typeof YT !== 'undefined' && YT.Player && currentPlaying === -1 && players.length === 0) {
        fetchShorts();
    }
});
</script>

</body>
</html>
