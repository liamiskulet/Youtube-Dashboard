      function Icon({ name, className = "w-5 h-5", fill = "none" }) {
        return (
          <svg
            className={className}
            viewBox="0 0 24 24"
            fill={fill}
            stroke="currentColor"
            strokeWidth="2"
            strokeLinecap="round"
            strokeLinejoin="round"
            aria-hidden="true"
          >
            {(ICONS[name] || []).map((d) => (
              <path key={d} d={d} />
            ))}
          </svg>
        );
      }

      // -----------------------------------------------------------------------
      // 3. Helpers / ApiService
      // -----------------------------------------------------------------------

      function shuffle(items) {
        const copy = [...items];
        for (let i = copy.length - 1; i > 0; i--) {
          const j = Math.floor(Math.random() * (i + 1));
          [copy[i], copy[j]] = [copy[j], copy[i]];
        }
        return copy;
      }

      function randomBetween(min, max) {
        return Math.floor(Math.random() * (max - min + 1)) + min;
      }

      function formatMetric(value) {
        if (value >= 1_000_000) {
          return `${(value / 1_000_000).toFixed(value >= 10_000_000 ? 0 : 1).replace(".0", "")}M`;
        }
        if (value >= 1_000) {
          return `${(value / 1_000).toFixed(value >= 100_000 ? 0 : 1).replace(".0", "")}K`;
        }
        return String(value);
      }

      function createEngagementMetrics() {
        const likes         = randomBetween(50_000, 3_000_000);
        const commentsCount = randomBetween(500, 100_000);
        const shares        = randomBetween(100, 50_000);
        const views         = randomBetween(100_000, 20_000_000);
        return {
          likes,
          likesLabel:    formatMetric(likes),
          commentsCount,
          commentsLabel: formatMetric(commentsCount),
          shares,
          sharesLabel:   formatMetric(shares),
          views,
          viewsLabel:    formatMetric(views),
        };
      }

      // ApiService — encapsulates all YouTube Data API v3 interaction
      const ApiService = {
        buildSearchUrl(query, apiKey, pageToken = "") {
          const params = new URLSearchParams({
            part:           "snippet",
            type:           "video",
            videoDuration:  "short",
            videoEmbeddable:"true",
            maxResults:     String(SEARCH_BATCH_SIZE),
            q:              `${query} shorts`,
            key:            apiKey,
          });
          if (pageToken) params.set("pageToken", pageToken);
          return `https://www.googleapis.com/youtube/v3/search?${params.toString()}`;
        },

        formatApiVideo(item) {
          const videoId = item?.id?.videoId;
          if (!videoId || item?.id?.kind !== "youtube#video") return null;
          if (["live", "upcoming"].includes(item?.snippet?.liveBroadcastContent)) return null;
          return {
            id:      videoId,
            title:   item.snippet.title,
            channel: item.snippet.channelTitle || "CreativeCreator",
            liked:   false,
            ...createEngagementMetrics(),
          };
        },

        async fetchBatch(query, apiKey, pageToken = "") {
          const url      = ApiService.buildSearchUrl(query, apiKey, pageToken);
          const response = await fetch(url);
          const data     = await response.json();
          if (data.error) throw new Error(data.error.message);
          return data;
        },
      };

      // -----------------------------------------------------------------------
      // 4. Components
      // -----------------------------------------------------------------------

      // -- SearchHeader --------------------------------------------------------
      function SearchHeader({ currentQuery, onSearch, apiKey, onChangeApiKey, isLoading, isUsingFallback }) {
        const [inputValue,    setInputValue]    = useState(currentQuery);
        const [showKeyPanel,  setShowKeyPanel]  = useState(false);
        const [tempKey,       setTempKey]       = useState(apiKey);

        useEffect(() => { setInputValue(currentQuery); }, [currentQuery]);

        function handleSubmit(e) {
          e.preventDefault();
          if (inputValue.trim()) onSearch(inputValue.trim());
        }

        function saveApiKey() {
          onChangeApiKey(tempKey.trim());
          setShowKeyPanel(false);
        }

        return (
          <div className="fixed top-0 left-0 right-0 z-40 bg-gradient-to-b from-black/90 via-black/50 to-transparent pt-safe pb-4 px-4 pointer-events-none">

                  </div>

                </div>

                      type="text"
                      placeholder="Query system files..."
                      value={inputValue}
                      onChange={(e) => setInputValue(e.target.value)}

                  id="api-key-toggle-btn"

      // -- VideoSection --------------------------------------------------------
      function VideoSection({ video, index, isActive, shouldLoadEmbed, isMuted, onTapMedia }) {
        const [isPlaying,    setIsPlaying]    = useState(isActive);
        const [feedbackIcon, setFeedbackIcon] = useState(null);
        const [isBuffering,  setIsBuffering]  = useState(true);

        useEffect(() => {
          setIsPlaying(isActive);
          if (!isActive) return;
          setIsBuffering(true);
          const t = setTimeout(() => setIsBuffering(false), 950);
          return () => clearTimeout(t);
        }, [isActive]);

        function handleMediaTap() {
          const next = !isPlaying;
          setIsPlaying(next);
          setFeedbackIcon(next ? "play" : "pause");
          onTapMedia();
          setTimeout(() => setFeedbackIcon(null), 550);
        }

        const ytQuery = [
          `autoplay=${isActive && isPlaying ? 1 : 0}`,
          `mute=${isMuted ? 1 : 0}`,
          "controls=0",
          "loop=1",
          `playlist=${video.id}`,
          "enablejsapi=1",
          "playsinline=1",
          "modestbranding=1",
          "rel=0",
          "showinfo=0",
          "iv_load_policy=3",
          "disablekb=1",
        ].join("&");

        const embedUrl = `https://www.youtube.com/embed/${video.id}?${ytQuery}`;

        return (
          <div
            id={`video-section-${index}`}
            className="relative w-full h-screen bg-black overflow-hidden flex items-center justify-center snap-start"
          >
            {/* Background glow */}
            <div className="absolute inset-0 bg-neutral-950 pointer-events-none z-0">
              <div
                className="absolute inset-x-0 top-1/4 h-1/2 opacity-35 blur-[120px]"
                style={{ backgroundImage: "radial-gradient(circle, rgba(99,102,241,0.35) 0%, transparent 70%)" }}
              />
            </div>

            {/* Player container */}
            <div className="relative w-full h-full max-w-[56.25vh] bg-black shadow-2xl flex items-center justify-center z-10 transition-all duration-500">
              {shouldLoadEmbed ? (
                <iframe
                  id={`yt-iframe-${video.id}`}
                  title={video.title}
                  src={embedUrl}
                  allow="autoplay; encrypted-media; gyroscope; picture-in-picture"
                  className="w-full h-full absolute inset-0 border-none transition-opacity duration-500 pointer-events-none"
                  loading={isActive ? "eager" : "lazy"}
                />
              ) : (
                <div className="absolute inset-0 bg-neutral-900 flex flex-col items-center justify-center">
                  <div className="w-14 h-14 rounded-full bg-white/5 border border-white/10 flex items-center justify-center animate-pulse">
                    <Icon name="play" className="w-6 h-6 text-white/50 pl-1" />
                  </div>
                </div>
              )}

              {/* Tap layer */}
              <div
                id={`tap-layer-${index}`}
                onClick={handleMediaTap}
                data-tap-layer="true"
                className="absolute inset-0 cursor-pointer z-20 select-none active:bg-white/5 transition-colors duration-100"
              />

              {/* Play/pause feedback */}
              {feedbackIcon && (
                <div className="absolute inset-0 flex items-center justify-center pointer-events-none z-30 select-none">
                  <div className="w-20 h-20 rounded-full bg-black/50 border border-white/20 flex items-center justify-center text-white scale-[1.3] opacity-0 animate-ping">
                    <Icon name={feedbackIcon} className="w-8 h-8 fill-white" />
                  </div>
                </div>
              )}

              {/* Gradient overlays */}
              <div className="absolute top-0 inset-x-0 h-40 bg-gradient-to-b from-black/80 via-black/35 to-transparent pointer-events-none z-20" />
              <div className="absolute bottom-0 inset-x-0 h-80 bg-gradient-to-t from-black/95 via-black/50 to-transparent pointer-events-none z-20" />

              {/* Buffering spinner */}
              {isBuffering && isActive && (
                <div className="absolute inset-0 bg-black/20 backdrop-blur-sm flex items-center justify-center pointer-events-none z-30">
                  <Icon name="refresh" className="w-8 h-8 text-indigo-400 animate-spin" />
                </div>
              )}

              {/* Video info overlay */}
              <div className="absolute left-6 bottom-8 right-16 z-30 text-white flex flex-col gap-2.5 pointer-events-none">
                <div className="flex items-center">
                  <span className="bg-gradient-to-br from-indigo-500/90 to-purple-600/90 text-white font-bold text-[10px] tracking-widest uppercase px-3.5 py-1.5 rounded-xl border border-indigo-400/20 shadow-[0_0_12px_rgba(99,102,241,0.3)] pointer-events-auto cursor-pointer flex items-center gap-1.5 transition-all active:scale-95">
                    <span>@{video.channel}</span>
                    <span className="w-1.5 h-1.5 rounded-full bg-emerald-400 animate-pulse shadow-[0_0_8px_rgba(52,211,153,0.8)]" />
                  </span>
                </div>

                <h2 className="text-[14.5px] font-medium leading-relaxed tracking-wide text-neutral-100 drop-shadow-md pr-4 line-clamp-2">
                  {video.title}
                </h2>

                <div className="flex items-center gap-2 text-[10px] text-zinc-300 font-mono uppercase tracking-wider">
                  <span>{video.viewsLabel} views</span>
                  <span className="w-1 h-1 rounded-full bg-zinc-500" />
                  <span>{video.sharesLabel} shares</span>
                </div>

                {video.isFallback && (
                  <div className="flex items-center gap-1.5 text-[10px] text-amber-500 font-semibold uppercase tracking-wider mt-1 opacity-75">
                    <span className="w-1.5 h-1.5 rounded-full bg-amber-500 animate-pulse" />
                    <span>Cinematic Fallback Stream</span>
                  </div>
                )}
              </div>
            </div>
          </div>

      // -- ActionButton --------------------------------------------------------

              title={title}
              className={`w-12 h-12 rounded-xl flex items-center justify-center border backdrop-blur-md transition-all cursor-pointer shadow-lg active:scale-95 ${
                active

                  : "bg-zinc-900/40 border-white/5 text-zinc-400 hover:bg-zinc-900/85 hover:text-white"
              } ${extraClass}`}

              <Icon name={icon} className="w-5 h-5" fill={fill} />
            </button>
            <span className="text-[10px] text-zinc-300 font-bold mt-1 shadow-sm font-mono tracking-wider uppercase text-center">
              {label}
            </span>
          </div>
        );

      function Sidebar({ video, index, onLikeToggle, onOpenComments, onShare, isMuted, onMuteToggle, viewMode, onViewModeToggle }) {

            <ActionButton
              id={`like-btn-${index}`}
              title="Like Video"
              label={video.likesLabel}
              icon="heart"
              active={video.liked}
              extraClass={likeAnimate ? "animate-bounce" : ""}

            <ActionButton

            {/* Backdrop */}
            <div

                  id="close-comments-sheet"

                      <div className={`w-9 h-9 rounded-full ${item.avatarColor} text-white font-bold text-xs flex items-center justify-center shadow-inner flex-shrink-0 select-none`}>

                      <div className="flex-1 min-w-0 bg-white/5 rounded-2xl px-4 py-2.5 border border-white/5">
                        <div className="flex justify-between items-baseline mb-0.5 gap-2">
                          <span className="font-bold text-indigo-300 text-[13px]">{item.username}</span>
                          <span className="text-[10px] text-zinc-500 font-medium">{item.timestamp}</span>
                        </div>
                        <p className="text-white/95 text-[13.5px] leading-relaxed break-words">{item.text}</p>
                      </div>
                    </div>
                  ))
                )}
              </div>

              {/* Comment input */}
              <form onSubmit={handleSubmit} className="p-4 border-t border-white/5 bg-zinc-950 flex gap-3 items-center">
                <input
                  id="new-comment-input"
                  type="text"
                  placeholder="Add a clean comment..."
                  value={inputText}
                  onChange={(e) => setInputText(e.target.value)}
                  className="flex-1 bg-white/5 text-white placeholder-white/30 text-sm border border-white/10 rounded-full px-5 py-2.5 outline-none focus:border-indigo-500 transition-colors"
                />
                <button
                  id="comment-post-btn"
                  type="submit"
                  disabled={!inputText.trim()}
                  className="w-10 h-10 rounded-full bg-gradient-to-br from-indigo-500 to-purple-600 disabled:opacity-40 hover:opacity-90 active:scale-95 flex items-center justify-center text-white transition-all cursor-pointer flex-shrink-0 shadow-lg shadow-indigo-500/20 border border-indigo-400/20"
                >
                  <Icon name="send" className="w-4 h-4" />

      }

      // -- GridExplorer --------------------------------------------------------
      function GridExplorer({ videos, onSelectVideo, currentQuery }) {
        return (
          <div className="w-full min-h-screen bg-black pt-28 pb-10 px-4 scroll-smooth">
            <div className="max-w-6xl mx-auto">

              <div className="flex justify-between items-center mb-8 border-b border-white/10 pb-4">
                <div>
                  <h1 className="text-white font-extralight text-2xl tracking-tight italic flex items-center gap-2">
                    <Icon name="sparkles" className="w-5 h-5 text-indigo-400 animate-pulse" />
                    <span className="font-semibold uppercase tracking-wider">Shorts</span>
                  </h1>
                  <p className="text-xs text-zinc-500 mt-1 uppercase tracking-wider font-mono">
                    System configured for: "{currentQuery}"
                  </p>

                <div className="text-[9px] bg-indigo-500/10 text-indigo-400 font-extrabold px-3 py-1.5 rounded-md border border-indigo-500/20 tracking-widest uppercase font-mono">

              {/* Empty state */}
              {videos.length === 0 ? (
                <div className="flex flex-col items-center justify-center text-center py-24 text-neutral-500">

                  <p className="text-base font-semibold text-white">No reels loaded</p>
                  <p className="text-xs mt-1">Try another search query.</p>

              ) : (
                <div className="grid grid-cols-2 sm:grid-cols-4 gap-4">
                  {videos.map((video, index) => (
                    <div
                      id={`grid-card-${index}`}
                      key={video.id + index}
                      onClick={() => onSelectVideo(index)}
                      className="group relative aspect-[9/16] bg-zinc-900/40 rounded-2xl overflow-hidden cursor-pointer border border-white/5 hover:border-indigo-500/40 hover:shadow-2xl hover:shadow-indigo-500/10 transition-all duration-300 transform hover:-translate-y-1.5"
                    >
                      {/* Thumbnail */}
                      <div className="absolute inset-0 z-0">
                        <img
                          src={`https://img.youtube.com/vi/${video.id}/hqdefault.jpg`}

                          referrerPolicy="no-referrer"

                        />
                        <div className="absolute inset-0 bg-gradient-to-t from-black via-black/45 to-black/15 group-hover:via-black/20 transition-colors" />
                      </div>

                      {/* Fallback badge */}
                      <div className="absolute top-3 left-3 z-10 flex items-center gap-1.5 opacity-90">
                        {video.isFallback && (
                          <span className="bg-amber-500/95 text-black font-extrabold text-[8px] tracking-wider px-2 py-0.5 rounded-sm uppercase select-none font-mono">
                            Scenic
                          </span>
                        )}

                      {/* Hover play button */}
                      <div className="absolute inset-0 flex items-center justify-center opacity-0 group-hover:opacity-100 z-10 transition-opacity duration-300">
                        <div className="w-12 h-12 rounded-xl bg-gradient-to-br from-indigo-500 to-purple-600 text-white flex items-center justify-center shadow-lg shadow-indigo-500/40 scale-75 group-hover:scale-100 transition-transform duration-300">
                          <Icon name="play" className="w-5 h-5 fill-white pl-0.5" />
                        </div>
                      </div>

                      {/* Card info */}
                      <div className="absolute bottom-0 inset-x-0 p-4 z-10 text-white flex flex-col gap-1.5">
                        <span className="text-[10px] text-indigo-400 font-extrabold font-mono tracking-widest uppercase truncate">@{video.channel}</span>
                        <h3 className="text-xs font-bold leading-relaxed line-clamp-2 text-zinc-100 group-hover:text-white transition-colors">
                          {video.title}
                        </h3>
                        <div className="flex gap-3 text-[10px] text-zinc-500 font-mono mt-1 pt-2 border-t border-white/10">
                          <span className="flex items-center gap-1">
                            <Icon name="heart" className="w-3.5 h-3.5 text-indigo-400" />
                            <span>{video.likesLabel}</span>
                          </span>
                          <span className="flex items-center gap-1">
                            <Icon name="message" className="w-3.5 h-3.5 text-purple-400" />
                            <span>{video.commentsLabel}</span>
                          </span>
                          <span>{video.viewsLabel}</span>
                        </div>
                      </div>
                    </div>
                  ))}
                </div>
              )}
            </div>
          </div>
        );
      }

      // -----------------------------------------------------------------------
      // 5. App (root)
      // -----------------------------------------------------------------------

      function App() {
        const [apiKey,          setApiKey]          = useState(() => localStorage.getItem("yt_api_key") || DEFAULT_YOUTUBE_API_KEY);
        const [videos,          setVideos]          = useState([]);
        const [currentQuery,    setCurrentQuery]    = useState(DEFAULT_SEARCH_QUERY);
        const [activeIndex,     setActiveIndex]     = useState(0);
        const [isMuted,         setIsMuted]         = useState(true);
        const [showSoundPrompt, setShowSoundPrompt] = useState(true);
        const [viewMode,        setViewMode]        = useState("feed");
        const [isLoading,       setIsLoading]       = useState(false);
        const [isUsingFallback, setIsUsingFallback] = useState(false);
        const [nextPageToken,   setNextPageToken]   = useState("");
        const [hasMoreVideos,   setHasMoreVideos]   = useState(true);
        const [allComments,     setAllComments]     = useState(() => INITIAL_COMMENTS);
        const [isCommentsOpen,  setIsCommentsOpen]  = useState(false);
        const [toastMessage,    setToastMessage]    = useState(null);

        const feedContainerRef   = useRef(null);
        const toastTimeoutRef    = useRef(null);
        const loadedVideoIdsRef  = useRef(new Set());
        const requestGenRef      = useRef(0);
        const apiKeyRef          = useRef(apiKey);
        const isLoadingMoreRef   = useRef(false);

        // Keep apiKeyRef + localStorage in sync
        useEffect(() => {
          apiKeyRef.current = apiKey;
          localStorage.setItem("yt_api_key", apiKey);
        }, [apiKey]);

        // -- Toast helper --
        function showToast(message) {
          if (toastTimeoutRef.current) clearTimeout(toastTimeoutRef.current);
          setToastMessage(message);
          toastTimeoutRef.current = window.setTimeout(() => setToastMessage(null), 2800);
        }

        // -- Core fetch (delegates to ApiService) --
        async function fetchDiscoveryBatch(baseQuery, { reset = false, generation = requestGenRef.current } = {}) {
          const pageToken = reset ? "" : nextPageToken;

          if (reset) {
            loadedVideoIdsRef.current = new Set();
            setNextPageToken("");
            setHasMoreVideos(true);
          }

          const data = await ApiService.fetchBatch(baseQuery, apiKeyRef.current, pageToken);

          if (generation !== requestGenRef.current) return [];

          const newToken = data.nextPageToken || "";
          setNextPageToken(newToken);
          setHasMoreVideos(Boolean(newToken));

          const fresh = [];
          for (const item of data.items || []) {
            const formatted = ApiService.formatApiVideo(item);
            if (!formatted || loadedVideoIdsRef.current.has(formatted.id)) continue;
            loadedVideoIdsRef.current.add(formatted.id);
            fresh.push(formatted);
          }
          return fresh;
        }

        // -- Search / reset --
        async function handleSearch(query) {
          const q          = (query || DEFAULT_SEARCH_QUERY).trim() || DEFAULT_SEARCH_QUERY;
          const generation = requestGenRef.current + 1;
          requestGenRef.current = generation;

          setCurrentQuery(q);
          setVideos([]);
          setActiveIndex(0);
          setIsLoading(true);
          setIsUsingFallback(false);
          setViewMode("feed");
          setIsCommentsOpen(false);
          isLoadingMoreRef.current = false;

          requestAnimationFrame(() => {
            if (feedContainerRef.current) feedContainerRef.current.scrollTo({ top: 0, behavior: "auto" });
          });

          try {
            const fresh = await fetchDiscoveryBatch(q, { reset: true, generation });
            if (generation !== requestGenRef.current) return;
            if (!fresh.length) throw new Error("No unique Shorts results yielded");
            setVideos(fresh);
            showToast(`Loaded ${fresh.length} ${q} shorts`);
          } catch (err) {
            if (generation !== requestGenRef.current) return;
            console.warn("YouTube discovery failed; using fallback stream.", err);
            const fallback = FALLBACK_VIDEOS.map((v) => ({ ...v, ...createEngagementMetrics() }));
            loadedVideoIdsRef.current = new Set(fallback.map((v) => v.id));
            setIsUsingFallback(true);
            setHasMoreVideos(false);
            setVideos(shuffle(fallback));
            showToast("YouTube API failed; fallback stream loaded");
          } finally {
            if (generation === requestGenRef.current) setIsLoading(false);
          }
        }

        // -- Infinite scroll load-more --
        async function loadMoreVideos() {
          if (isLoadingMoreRef.current || isLoading || !hasMoreVideos || videos.length === 0) return;
          isLoadingMoreRef.current = true;
          const generation = requestGenRef.current;
          setIsLoading(true);

          try {
            const more = await fetchDiscoveryBatch(currentQuery, { reset: false, generation });
            if (generation !== requestGenRef.current) return;
            if (more.length) {
              setVideos((prev) => [...prev, ...more]);
              showToast(`Added ${more.length} more ${currentQuery} shorts`);
            } else {
              setHasMoreVideos(false);
              showToast("All shorts loaded");
            }
          } catch (err) {
            if (generation !== requestGenRef.current) return;
            console.warn("Endless loading paused after API failure.", err);
            showToast("API limit reached; recommendations paused");
          } finally {
            if (generation === requestGenRef.current) setIsLoading(false);
            isLoadingMoreRef.current = false;
          }
        }

        // Initial load
        useEffect(() => { handleSearch(DEFAULT_SEARCH_QUERY); }, []);

        // Trigger load-more when nearing end
        useEffect(() => {
          if (viewMode !== "feed" || videos.length === 0) return;
          if (activeIndex >= videos.length - 3) loadMoreVideos();
        }, [activeIndex, videos.length, viewMode]);

        // IntersectionObserver — track active video
        useEffect(() => {
          if (viewMode !== "feed" || videos.length === 0) return;

          const observer = new IntersectionObserver(
            (entries) => {
              entries.forEach((entry) => {
                if (entry.isIntersecting && entry.intersectionRatio >= 0.6) {
                  const idx = Number(entry.target.id.replace("video-section-", ""));
                  if (!Number.isNaN(idx) && idx !== activeIndex) setActiveIndex(idx);
                }
              });
            },
            { threshold: [0.6] }
          );

          const t = setTimeout(() => {
            videos.forEach((_, i) => {
              const el = document.getElementById(`video-section-${i}`);
              if (el) observer.observe(el);
            });
          }, 350);

          return () => { observer.disconnect(); clearTimeout(t); };
        }, [videos, viewMode]);

        // IntersectionObserver — pagination sentinel (last video)
        useEffect(() => {
          if (viewMode !== "feed" || videos.length === 0 || !hasMoreVideos) return;
          const last = document.getElementById(`video-section-${videos.length - 1}`);
          if (!last) return;

          const sentinel = new IntersectionObserver(
            (entries) => { entries.forEach((e) => { if (e.isIntersecting) loadMoreVideos(); }); },
            { threshold: 0.1 }
          );
          sentinel.observe(last);
          return () => sentinel.disconnect();
        }, [videos.length, viewMode, hasMoreVideos]);

        // -- Interaction handlers --
        function handleLikeToggle(index) {
          setVideos((prev) => {
            const clone = [...prev];
            const item  = clone[index];
            if (!item) return clone;
            const newLikes = item.liked ? Math.max(0, item.likes - 1) : item.likes + 1;
            clone[index] = { ...item, liked: !item.liked, likes: newLikes, likesLabel: formatMetric(newLikes) };
            return clone;
          });
        }

        function handleMuteToggle() {
          setIsMuted((v) => !v);
          setShowSoundPrompt(false);
        }

        function handleGlobalInteraction() {
          if (!showSoundPrompt) return;
          setIsMuted(false);
          setShowSoundPrompt(false);
        }

        function handleShareClick(index) {
          const video = videos[index];
          if (!video) return;
          const url = `https://www.youtube.com/watch?v=${video.id}`;
          if (navigator.share) { navigator.share({ title: video.title, url }).catch(() => {}); return; }
          navigator.clipboard.writeText(url).then(() => showToast("Reel link copied to clipboard"));
        }

        function scrollIndexTo(direction) {
          const next = direction === "up" ? activeIndex - 1 : activeIndex + 1;
          if (next < 0 || next >= videos.length) return;
          const el = document.getElementById(`video-section-${next}`);
          if (el) { el.scrollIntoView({ behavior: "smooth", block: "start" }); setActiveIndex(next); }
        }

        function handleAddComment(videoId, text) {
          const newComment = {
            id:          `comment-${Date.now()}`,
            videoId,
            username:    "You",
            text,
            timestamp:   "Just now",
            avatarColor: "bg-rose-500",
          };
          setAllComments((prev) => ({ ...prev, [videoId]: [...(prev[videoId] || []), newComment] }));
          setVideos((prev) =>
            prev.map((v) =>
              v.id === videoId
                ? { ...v, commentsCount: v.commentsCount + 1, commentsLabel: formatMetric(v.commentsCount + 1) }
                : v
            )
          );
        }

        function handleSelectFromGrid(index) {
          setViewMode("feed");
          setActiveIndex(index);
          setTimeout(() => {
            const el = document.getElementById(`video-section-${index}`);
            if (el) el.scrollIntoView({ behavior: "auto", block: "start" });
          }, 150);
        }

        const activeVideo       = videos[activeIndex];
        const activeCommentList = activeVideo ? allComments[activeVideo.id] || [] : [];

        return (
          <div
            onClick={handleGlobalInteraction}
            className="relative w-full h-screen bg-[#050505] text-zinc-100 overflow-hidden font-sans select-none"
          >
            {/* Dot-grid texture */}
            <div
              className="absolute inset-0 pointer-events-none opacity-[0.03] z-10"
              style={{ backgroundImage: "radial-gradient(#fff 1px, transparent 1px)", backgroundSize: "24px 24px" }}
            />

            {/* Persistent top search header */}
            <SearchHeader
              currentQuery={currentQuery}
              onSearch={handleSearch}
              apiKey={apiKey}
              onChangeApiKey={(val) => {
                apiKeyRef.current = val;
                setApiKey(val);
                setTimeout(() => handleSearch(currentQuery), 200);
              }}
              isLoading={isLoading}
              isUsingFallback={isUsingFallback}
            />

            {/* viewMode: feed vs grid */}
            {viewMode === "feed" ? (
              <div className="relative w-full h-screen pb-6">
                {/* Scrollable reel feed */}
                <div
                  ref={feedContainerRef}
                  className="w-full h-full overflow-y-scroll snap-y snap-mandatory scroll-smooth no-scrollbar"
                  style={{ WebkitOverflowScrolling: "touch" }}
                >
                  {videos.map((video, index) => {
                    const dist            = Math.abs(index - activeIndex);
                    const shouldLoadEmbed = index === activeIndex ||
                      (index > activeIndex && index <= activeIndex + NEARBY_RENDER_DISTANCE) ||
                      dist <= 1;

                    return (
                      <VideoSection
                        key={video.id + index}
                        video={video}
                        index={index}
                        isActive={index === activeIndex}
                        shouldLoadEmbed={shouldLoadEmbed}
                        isMuted={isMuted}
                        onTapMedia={handleMuteToggle}
                      />
                    );
                  })}

                  {/* Loading spinner at feed bottom */}
                  {isLoading && videos.length > 0 && (
                    <div className="w-full h-24 flex items-center justify-center bg-black snap-start">
                      <Icon name="refresh" className="w-6 h-6 text-indigo-400 animate-spin" />
                    </div>
                  )}
                </div>

                {/* Desktop prev/next navigation */}
                <div className="absolute left-6 top-1/2 -translate-y-1/2 z-30 hidden md:flex flex-col gap-4">
                  <button
                    onClick={() => scrollIndexTo("up")}
                    disabled={activeIndex === 0}
                    title="Previous Reel"
                    className="w-12 h-12 rounded-xl bg-zinc-900/40 border border-white/5 text-zinc-400 hover:text-white hover:border-indigo-500/50 flex items-center justify-center cursor-pointer transition-all disabled:opacity-30 disabled:cursor-not-allowed"
                  >
                    <Icon name="chevronUp" className="w-5 h-5" />
                  </button>
                  <div className="text-center font-mono text-xs font-bold text-zinc-500 py-1">
                    {activeIndex + 1} / {videos.length}
                  </div>
                  <button
                    onClick={() => scrollIndexTo("down")}
                    disabled={activeIndex === videos.length - 1}
                    title="Next Reel"
                    className="w-12 h-12 rounded-xl bg-zinc-900/40 border border-white/5 text-zinc-400 hover:text-white hover:border-indigo-500/50 flex items-center justify-center cursor-pointer transition-all disabled:opacity-30 disabled:cursor-not-allowed"
                  >
                    <Icon name="chevronDown" className="w-5 h-5" />
                  </button>
                </div>

                {/* Sidebar action buttons */}
                {activeVideo && (
                  <Sidebar
                    video={activeVideo}
                    index={activeIndex}
                    onLikeToggle={() => handleLikeToggle(activeIndex)}
                    onOpenComments={() => setIsCommentsOpen(true)}
                    onShare={() => handleShareClick(activeIndex)}
                    isMuted={isMuted}
                    onMuteToggle={handleMuteToggle}
                    viewMode={viewMode}
                    onViewModeToggle={() => setViewMode("grid")}
                  />
                )}
              </div>
            ) : (
              <GridExplorer
                videos={videos}
                onSelectVideo={handleSelectFromGrid}
                currentQuery={currentQuery}
              />
            )}

            {/* Comment panel (slide-up sheet) */}
            {activeVideo && (
              <CommentPanel
                isOpen={isCommentsOpen}
                onClose={() => setIsCommentsOpen(false)}
                videoId={activeVideo.id}
                videoTitle={activeVideo.title}
                comments={activeCommentList}
                onAddComment={handleAddComment}
              />
            )}

            {/* Sound prompt CTA */}
            {showSoundPrompt && (
              <div
                onClick={handleMuteToggle}
                className="fixed bottom-24 left-1/2 -translate-x-1/2 z-30 px-5 py-3 rounded-xl bg-gradient-to-r from-indigo-500 to-purple-600 hover:from-indigo-600 hover:to-purple-700 text-white font-bold text-xs shadow-xl shadow-indigo-500/20 backdrop-blur-md flex items-center gap-2 border border-indigo-400/20 cursor-pointer animate-bounce group"
              >
                <Icon name="volume" className="w-4 h-4 animate-pulse group-hover:scale-110 transition-transform text-teal-300" />
                <span className="tracking-widest font-mono text-[10px] uppercase">Activate Audio Node</span>
              </div>
            )}

            {/* Ticker footer */}
            <footer className="fixed bottom-0 left-0 right-0 h-6 bg-indigo-600 text-white flex items-center overflow-hidden z-40 select-none pointer-events-none">
              <div className="flex gap-16 whitespace-nowrap text-[9px] font-bold uppercase tracking-[0.25em] animate-marquee">
                <span>Critical Update: Neural Core v2.4 initialized...</span>
                <span>System Status: Optimal...</span>
                <span>All visual nodes green...</span>
                <span>Latency: 12ms / Stable...</span>
                <span>Active curations synced...</span>
                <span>Critical Update: Neural Core v2.4 initialized...</span>
                <span>System Status: Optimal...</span>
                <span>Ready for command.</span>
              </div>
            </footer>

            {/* Toast notification */}
            {toastMessage && (
              <div className="fixed bottom-10 left-1/2 -translate-x-1/2 z-50 px-5 py-3 rounded-xl bg-zinc-900/95 text-zinc-100 border border-white/10 shadow-2xl flex items-center gap-2 font-semibold text-xs tracking-wider">
                <Icon name="sparkles" className="w-3.5 h-3.5 text-indigo-400" />
                <span>{toastMessage}</span>
              </div>
            )}
          </div>
        );
      }

      // Mount
      ReactDOM.createRoot(document.getElementById("root")).render(
        <React.StrictMode>
          <App />
        </React.StrictMode>
      );
    </script>
  </body>
</html>
