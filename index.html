<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8" />

<meta
    name="viewport"
    content="width=device-width, initial-scale=1.0, viewport-fit=cover"
/>

<title>Premium Personalized Shorts Feed</title>

<!-- ==========================================
     GOOGLE FONTS
========================================== -->

<link
    rel="preconnect"
    href="https://fonts.googleapis.com"
/>

<link
    rel="preconnect"
    href="https://fonts.gstatic.com"
    crossorigin
/>

<link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
    rel="stylesheet"
/>

<style>

/* ==========================================
   RESET
========================================== */

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

html,
body{
    width:100%;
    height:100%;
    overflow:hidden;
    background:#000;

    font-family:
        "Inter",
        sans-serif;

    color:white;

    -webkit-tap-highlight-color:
        transparent;
}

/* ==========================================
   ROOT
========================================== */

:root{

    --glass-bg:
        rgba(0,0,0,.38);

    --glass-border:
        rgba(255,255,255,.10);

    --glass-shadow:
        0 10px 40px rgba(0,0,0,.45);

}

/* ==========================================
   APP
========================================== */

#app{
    position:relative;
    width:100%;
    height:100%;
    overflow:hidden;
    background:#000;
}

/* ==========================================
   FEED
========================================== */

#feed{
    width:100%;
    height:100vh;

    overflow-y:scroll;

    scroll-snap-type:y mandatory;

    scroll-behavior:smooth;

    overscroll-behavior-y:contain;

    -webkit-overflow-scrolling:touch;
}

.video-section{
    position:relative;

    width:100%;
    height:100vh;

    overflow:hidden;

    background:#000;

    scroll-snap-align:start;
}

/* ==========================================
   PLAYER
========================================== */

.player-shell{
    position:absolute;
    inset:0;
    overflow:hidden;
    background:#000;
}

.player-shell iframe{
    position:absolute;

    top:50%;
    left:50%;

    width:56.25vh;
    height:100vh;

    transform:
        translate(-50%,-50%);

    border:none;

    pointer-events:none;
}

@media(max-aspect-ratio:9/16){

    .player-shell iframe{

        width:100vw;
        height:177.78vw;

    }

}

/* ==========================================
   GLASS
========================================== */

.glass{
    background:
        var(--glass-bg);

    border:
        1px solid var(--glass-border);

    backdrop-filter:
        blur(16px);

    -webkit-backdrop-filter:
        blur(16px);

    box-shadow:
        var(--glass-shadow);
}

/* ==========================================
   SEARCH HEADER
========================================== */

.search-header{
    position:fixed;

    top:0;
    left:0;
    right:0;

    z-index:1000;

    padding:
        env(safe-area-inset-top)
        14px
        14px
        14px;

    background:
        linear-gradient(
            to bottom,
            rgba(0,0,0,.55),
            transparent
        );

    pointer-events:none;
}

.search-shell{
    width:100%;
    max-width:700px;

    margin:0 auto;

    display:flex;
    align-items:center;
    gap:12px;

    padding:12px;

    border-radius:26px;

    pointer-events:auto;
}

.search-input{
    flex:1;

    border:none;
    outline:none;

    background:transparent;

    color:white;

    font-size:15px;
    font-weight:500;
}

.search-input::placeholder{
    color:
        rgba(255,255,255,.65);
}

.search-btn{
    width:46px;
    height:46px;

    border:none;

    border-radius:50%;

    cursor:pointer;

    font-size:18px;

    color:white;

    display:flex;
    align-items:center;
    justify-content:center;

    transition:
        transform .15s ease;
}

.search-btn:hover{
    transform:scale(1.06);
}

.search-btn:active{
    transform:scale(.92);
}

/* ==========================================
   SEARCH HISTORY
========================================== */

.search-history{
    position:fixed;

    top:92px;
    left:50%;

    transform:translateX(-50%);

    width:calc(100% - 28px);
    max-width:700px;

    z-index:999;

    display:flex;
    flex-wrap:wrap;

    gap:10px;

    padding:12px;

    border-radius:22px;
}

.history-chip{
    border:none;

    cursor:pointer;

    color:white;

    font-size:13px;
    font-weight:600;

    padding:
        10px 14px;

    border-radius:999px;

    transition:
        transform .15s ease,
        background .15s ease;
}

.history-chip:hover{
    transform:scale(1.04);
}

/* ==========================================
   META
========================================== */

.meta{
    position:absolute;

    left:16px;
    bottom:95px;

    width:
        calc(100% - 120px);

    z-index:5;

    padding:16px;

    border-radius:24px;
}

.channel{
    font-size:14px;
    font-weight:700;

    margin-bottom:10px;

    opacity:.9;
}

.title{
    font-size:18px;
    line-height:1.5;
    font-weight:800;

    display:-webkit-box;

    -webkit-line-clamp:2;
    -webkit-box-orient:vertical;

    overflow:hidden;
}

/* ==========================================
   SIDEBAR
========================================== */

.sidebar{
    position:absolute;

    right:12px;
    bottom:95px;

    z-index:50;

    display:flex;
    flex-direction:column;

    gap:18px;
}

.action{
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:7px;
}

.action-btn{
    width:58px;
    height:58px;

    border-radius:50%;

    display:flex;
    align-items:center;
    justify-content:center;

    font-size:24px;

    cursor:pointer;

    transition:
        transform .15s ease;
}

.action-btn:active{
    transform:scale(.88);
}

.action-label{
    font-size:12px;
    font-weight:700;
}

/* ==========================================
   GRADIENTS
========================================== */

.top-gradient{
    position:absolute;

    top:0;
    left:0;
    right:0;

    height:180px;

    z-index:2;

    background:
        linear-gradient(
            to bottom,
            rgba(0,0,0,.75),
            transparent
        );
}

.bottom-gradient{
    position:absolute;

    left:0;
    right:0;
    bottom:0;

    height:48%;

    z-index:2;

    background:
        linear-gradient(
            to top,
            rgba(0,0,0,.95),
            rgba(0,0,0,.6),
            transparent
        );
}

/* ==========================================
   SOUND
========================================== */

.sound-overlay{
    position:fixed;

    top:150px;
    left:50%;

    transform:translateX(-50%);

    z-index:9999;

    padding:
        12px 18px;

    border-radius:999px;

    font-size:14px;
    font-weight:600;

    transition:
        opacity .4s ease,
        transform .4s ease;

    pointer-events:none;
}

.sound-overlay.hidden{
    opacity:0;

    transform:
        translateX(-50%)
        translateY(-15px);
}

/* ==========================================
   SCROLL BUTTONS
========================================== */

.scroll-controls{
    position:fixed;

    right:14px;
    top:50%;

    transform:translateY(-50%);

    z-index:999;

    display:flex;
    flex-direction:column;

    gap:14px;
}

.scroll-btn{
    width:58px;
    height:58px;

    border-radius:50%;

    border:none;

    color:white;

    font-size:24px;

    cursor:pointer;

    transition:
        transform .15s ease;
}

.scroll-btn:hover{
    transform:scale(1.06);
}

.scroll-btn:active{
    transform:scale(.92);
}

/* ==========================================
   LOADER
========================================== */

.loader-screen{
    width:100%;
    height:100vh;

    display:flex;
    align-items:center;
    justify-content:center;
}

.loader-ring{
    width:80px;
    height:80px;

    border-radius:50%;

    border:
        5px solid rgba(255,255,255,.08);

    border-top:
        5px solid white;

    animation:
        spin .8s linear infinite;
}

@keyframes spin{

    to{
        transform:rotate(360deg);
    }

}

/* ==========================================
   ERROR
========================================== */

.error{
    width:100%;
    height:100vh;

    display:flex;
    align-items:center;
    justify-content:center;

    padding:30px;

    text-align:center;

    font-size:18px;
    font-weight:700;
}

/* ==========================================
   MOBILE
========================================== */

@media(max-width:768px){

    .scroll-controls{
        top:auto;
        bottom:140px;

        transform:none;
    }

    .scroll-btn{
        width:52px;
        height:52px;
    }

}

</style>
</head>

<body>

<div id="app">

    <!-- ==========================================
         SEARCH
    ========================================== -->

    <div class="search-header">

        <div class="search-shell glass">

            <input
                type="text"
                id="searchInput"
                class="search-input"
                placeholder="Search shorts..."
                autocomplete="off"
                spellcheck="false"
            />

            <button
                id="searchBtn"
                class="search-btn glass"
            >
                🔍
            </button>

        </div>

    </div>

    <!-- ==========================================
         SEARCH HISTORY
    ========================================== -->

    <div
        id="searchHistory"
        class="search-history glass"
    ></div>

    <!-- ==========================================
         SOUND
    ========================================== -->

    <div
        id="soundOverlay"
        class="sound-overlay glass"
    >
        Tap Screen For Sound 🔊
    </div>

    <!-- ==========================================
         SCROLL CONTROLS
    ========================================== -->

    <div class="scroll-controls">

        <button
            id="scrollUp"
            class="scroll-btn glass"
        >
            ↑
        </button>

        <button
            id="scrollDown"
            class="scroll-btn glass"
        >
            ↓
        </button>

    </div>

    <!-- ==========================================
         FEED
    ========================================== -->

    <div id="feed">

        <div class="loader-screen">

            <div class="loader-ring"></div>

        </div>

    </div>

</div>

<!-- ==========================================
     LIBRARIES
========================================== -->

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script src="https://www.youtube.com/iframe_api"></script>

<!-- ==========================================
     APPLICATION
========================================== -->

<script>

(function(){

"use strict";

/* ==========================================
   CONFIG
========================================== */

const CONFIG = {

    SUPABASE_URL:
        "https://cfmdniuossejstrywbbx.supabase.co",

    SUPABASE_ANON_KEY:
        "sb_publishable_W0tVnUX_Nju1OVAipUCoHQ_EmjUAQ7T",

    YOUTUBE_API_KEY:
        "AIzaSyBeL88mCyBYNZAnxPQ4sExqTo1HjTjQ_Oc",

    MAX_RESULTS:
        50

};

/* ==========================================
   ELEMENTS
========================================== */

const elements = {

    feed:
        document.getElementById("feed"),

    searchInput:
        document.getElementById("searchInput"),

    searchBtn:
        document.getElementById("searchBtn"),

    searchHistory:
        document.getElementById("searchHistory"),

    soundOverlay:
        document.getElementById("soundOverlay"),

    scrollUp:
        document.getElementById("scrollUp"),

    scrollDown:
        document.getElementById("scrollDown")

};

/* ==========================================
   APP STATE
========================================== */

const state = {

    currentQuery:
        "anime edits",

    currentUser:
        null,

    activeIndex:
        -1,

    globalMuted:
        true,

    hasInteracted:
        false,

    observer:
        null,

    players:
        []

};

/* ==========================================
   UTILITIES
========================================== */

const Utils = (()=>{

    function escapeHTML(str=""){

        return str.replace(
            /[&<>"']/g,
            match=>({

                "&":"&amp;",
                "<":"&lt;",
                ">":"&gt;",
                '"':"&quot;",
                "'":"&#39;"

            })[match]
        );

    }

    return {

        escapeHTML

    };

})();

/* ==========================================
   SUPABASE SERVICE
========================================== */

const SupabaseService = (()=>{

    /*
        TRUE SINGLETON
        Prevents:
        "Identifier 'supabase' has already been declared"
    */

    if(!window.__SUPABASE_CLIENT__){

        window.__SUPABASE_CLIENT__ =
            window.supabase.createClient(
                CONFIG.SUPABASE_URL,
                CONFIG.SUPABASE_ANON_KEY
            );

    }

    const client =
        window.__SUPABASE_CLIENT__;

    async function initializeAuth(){

        try{

            const {
                data,
                error
            } = await client.auth.getUser();

            if(error){

                console.warn(error.message);

                return;

            }

            state.currentUser =
                data.user || null;

        }catch(error){

            console.error(
                "Auth initialization failed:",
                error
            );

        }

    }

    async function saveSearch(term){

        if(!state.currentUser)
            return;

        try{

            await client
                .from("search_history")
                .insert({

                    user_id:
                        state.currentUser.id,

                    search_term:
                        term,

                    timestamp:
                        new Date().toISOString()

                });

        }catch(error){

            console.error(
                "Save search failed:",
                error
            );

        }

    }

    async function getRecentSearches(){

        if(!state.currentUser)
            return [];

        try{

            const {
                data,
                error
            } = await client
                .from("search_history")
                .select(
                    "search_term, timestamp"
                )
                .eq(
                    "user_id",
                    state.currentUser.id
                )
                .order(
                    "timestamp",
                    { ascending:false }
                )
                .limit(10);

            if(error){

                console.error(error);

                return [];

            }

            return data || [];

        }catch(error){

            console.error(error);

            return [];

        }

    }

    return {

        initializeAuth,
        saveSearch,
        getRecentSearches

    };

})();

/* ==========================================
   YOUTUBE SERVICE
========================================== */

const YouTubeService = (()=>{

    async function search(query){

        const endpoint =
            `https://www.googleapis.com/youtube/v3/search` +
            `?part=snippet` +
            `&type=video` +
            `&videoDuration=short` +
            `&maxResults=${CONFIG.MAX_RESULTS}` +
            `&q=${encodeURIComponent(query)}` +
            `&key=${CONFIG.YOUTUBE_API_KEY}`;

        const response =
            await fetch(endpoint);

        const data =
            await response.json();

        return data.items || [];

    }

    return {

        search

    };

})();

/* ==========================================
   UI SERVICE
========================================== */

const UI = (()=>{

    function showLoader(){

        elements.feed.innerHTML = `

            <div class="loader-screen">

                <div class="loader-ring"></div>

            </div>

        `;

    }

    function showError(message){

        elements.feed.innerHTML = `

            <div class="error">

                ${message}

            </div>

        `;

    }

    async function renderSearchHistory(){

        const history =
            await SupabaseService
                .getRecentSearches();

        elements.searchHistory.innerHTML =
            "";

        if(!history.length){

            elements.searchHistory.style.display =
                "none";

            return;

        }

        elements.searchHistory.style.display =
            "flex";

        const uniqueTerms =
            [...new Set(
                history.map(
                    item=>item.search_term
                )
            )]
            .slice(0,5);

        uniqueTerms.forEach(term=>{

            const chip =
                document.createElement(
                    "button"
                );

            chip.className =
                "history-chip glass";

            chip.textContent =
                term;

            chip.addEventListener(
                "click",
                ()=>{

                    App.search(term);

                }
            );

            elements.searchHistory.appendChild(
                chip
            );

        });

    }

    return {

        showLoader,
        showError,
        renderSearchHistory

    };

})();

/* ==========================================
   PLAYER MANAGER
========================================== */

const PlayerManager = (()=>{

    function loadPlayer(index){

        const item =
            state.players[index];

        if(!item)
            return;

        if(item.initialized)
            return;

        const mount =
            document.getElementById(
                `player-${index}`
            );

        if(!mount)
            return;

        item.initialized =
            true;

        item.player =
            new YT.Player(
                `player-${index}`,
                {

                videoId:
                    item.videoId,

                playerVars:{

                    autoplay:0,
                    controls:0,
                    modestbranding:1,
                    rel:0,
                    fs:0,
                    playsinline:1,
                    loop:1,
                    playlist:item.videoId,
                    mute:1,
                    iv_load_policy:3,

                    enablejsapi:1,

                    origin:
                        window.location.origin

                },

                events:{

                    onReady:(event)=>{

                        if(
                            index ===
                            state.activeIndex
                        ){

                            try{

                                event.target.playVideo();

                            }catch(err){}

                        }

                    }

                }

            });

    }

    function destroyPlayer(index){

        const item =
            state.players[index];

        if(
            !item ||
            !item.player
        ){
            return;
        }

        try{

            item.player.stopVideo();

        }catch(err){}

        try{

            item.player.destroy();

        }catch(err){}

        item.player =
            null;

        item.initialized =
            false;

    }

    function ensureSlidingWindow(centerIndex){

        const allowed =
            new Set([

                centerIndex - 1,
                centerIndex,
                centerIndex + 1

            ]);

        allowed.forEach(index=>{

            if(
                index >= 0 &&
                index < state.players.length
            ){

                loadPlayer(index);

            }

        });

        state.players.forEach((_,index)=>{

            if(!allowed.has(index)){

                destroyPlayer(index);

            }

        });

    }

    return {

        loadPlayer,
        destroyPlayer,
        ensureSlidingWindow

    };

})();

/* ==========================================
   FEED RENDERER
========================================== */

const FeedRenderer = (()=>{

    function render(videos){

        elements.feed.innerHTML = "";

        state.players =
            videos.map(video => ({

                videoId:
                    video.id.videoId,

                player:
                    null,

                initialized:
                    false

            }));

        videos.forEach((video,index)=>{

            const section =
                document.createElement(
                    "section"
                );

            section.className =
                "video-section";

            section.dataset.index =
                index;

            section.innerHTML = `

                <div class="player-shell">

                    <div id="player-${index}"></div>

                </div>

                <div class="top-gradient"></div>

                <div class="bottom-gradient"></div>

                <div class="meta glass">

                    <div class="channel">

                        @${Utils.escapeHTML(
                            video.snippet.channelTitle
                        )}

                    </div>

                    <div class="title">

                        ${Utils.escapeHTML(
                            video.snippet.title
                        )}

                    </div>

                </div>

                <div class="sidebar">

                    <div class="action">

                        <div class="action-btn glass">
                            ❤️
                        </div>

                        <div class="action-label">
                            Like
                        </div>

                    </div>

                    <div class="action">

                        <div class="action-btn glass">
                            💬
                        </div>

                        <div class="action-label">
                            Comment
                        </div>

                    </div>

                    <div class="action">

                        <div class="action-btn glass">
                            📤
                        </div>

                        <div class="action-label">
                            Share
                        </div>

                    </div>

                </div>

            `;

            elements.feed.appendChild(
                section
            );

        });

        ObserverManager.setup();

        App.activateVideo(0);

    }

    return {

        render

    };

})();

/* ==========================================
   OBSERVER MANAGER
========================================== */

const ObserverManager = (()=>{

    function setup(){

        if(state.observer){

            state.observer.disconnect();

        }

        state.observer =
            new IntersectionObserver(

            entries=>{

                entries.forEach(entry=>{

                    if(
                        entry.isIntersecting &&
                        entry.intersectionRatio >= .75
                    ){

                        App.activateVideo(
                            Number(
                                entry.target.dataset.index
                            )
                        );

                    }

                });

            },
            {
                threshold:[0.75]
            });

        document
            .querySelectorAll(
                ".video-section"
            )
            .forEach(section=>{

                state.observer.observe(
                    section
                );

            });

    }

    return {

        setup

    };

})();

/* ==========================================
   APP CONTROLLER
========================================== */

const App = (()=>{

    async function initialize(){

        await SupabaseService
            .initializeAuth();

        await UI.renderSearchHistory();

        await search(
            state.currentQuery,
            false
        );

        attachEvents();

    }

    async function search(
        query,
        save=true
    ){

        state.currentQuery =
            query.trim();

        if(!state.currentQuery)
            return;

        UI.showLoader();

        if(save){

            await SupabaseService
                .saveSearch(
                    state.currentQuery
                );

            await UI.renderSearchHistory();

        }

        try{

            const videos =
                await YouTubeService.search(
                    state.currentQuery
                );

            if(!videos.length){

                UI.showError(
                    "No Shorts Found"
                );

                return;

            }

            FeedRenderer.render(
                videos
            );

        }catch(error){

            console.error(error);

            UI.showError(
                "Failed To Load Videos"
            );

        }

    }

    function activateVideo(index){

        if(
            index < 0 ||
            index >= state.players.length
        ){
            return;
        }

        if(
            state.activeIndex === index
        ){
            return;
        }

        state.activeIndex =
            index;

        PlayerManager
            .ensureSlidingWindow(
                index
            );

        state.players.forEach((item,i)=>{

            if(!item.player)
                return;

            try{

                if(i === index){

                    item.player.playVideo();

                    if(state.globalMuted){

                        item.player.mute();

                    }else{

                        item.player.unMute();

                    }

                }else{

                    item.player.pauseVideo();

                }

            }catch(err){}

        });

    }

    function scrollTo(index){

        if(index < 0)
            return;

        if(index >= state.players.length)
            return;

        const sections =
            document.querySelectorAll(
                ".video-section"
            );

        const target =
            sections[index];

        if(!target)
            return;

        target.scrollIntoView({

            behavior:"smooth"

        });

    }

    function enableSound(){

        if(state.hasInteracted)
            return;

        state.hasInteracted =
            true;

        state.globalMuted =
            false;

        elements.soundOverlay.classList.add(
            "hidden"
        );

        const current =
            state.players[
                state.activeIndex
            ];

        if(
            current &&
            current.player
        ){

            try{

                current.player.unMute();

            }catch(err){}

        }

    }

    function attachEvents(){

        elements.searchBtn.addEventListener(
            "click",
            ()=>{

                const value =
                    elements.searchInput.value.trim();

                if(!value)
                    return;

                search(value);

            }
        );

        elements.searchInput.addEventListener(
            "keydown",
            event=>{

                if(event.key === "Enter"){

                    const value =
                        elements.searchInput.value.trim();

                    if(!value)
                        return;

                    search(value);

                }

            }
        );

        elements.scrollUp.addEventListener(
            "click",
            ()=>{

                scrollTo(
                    state.activeIndex - 1
                );

            }
        );

        elements.scrollDown.addEventListener(
            "click",
            ()=>{

                scrollTo(
                    state.activeIndex + 1
                );

            }
        );

        document.body.addEventListener(
            "click",
            enableSound,
            { once:true }
        );

        document.body.addEventListener(
            "touchstart",
            enableSound,
            { once:true }
        );

    }

    return {

        initialize,
        search,
        activateVideo

    };

})();

/* ==========================================
   YOUTUBE GLOBAL CALLBACK
========================================== */

window.onYouTubeIframeAPIReady =
    function(){

        App.initialize();

    };

})();

</script>
