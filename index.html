<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8" />

<meta
    name="viewport"
    content="width=device-width, initial-scale=1.0, viewport-fit=cover"
/>

<title>Premium Personalized Shorts Feed</title>

<style>

/* =========================
   RESET
========================= */

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

html,
body{
    width:100%;
    height:100%;
    overflow:hidden;
    background:#000;

    font-family:
        Inter,
        -apple-system,
        BlinkMacSystemFont,
        "Segoe UI",
        sans-serif;

    -webkit-tap-highlight-color:
        transparent;
}

/* =========================
   APP
========================= */

#app{
    position:relative;
    width:100%;
    height:100%;
    overflow:hidden;
    background:#000;
}

/* =========================
   FEED
========================= */

#feed{
    width:100%;
    height:100vh;

    overflow-y:scroll;

    scroll-snap-type:y mandatory;

    scroll-behavior:smooth;

    -webkit-overflow-scrolling:touch;

    overscroll-behavior-y:contain;
}

.video-section{
    position:relative;

    width:100%;
    height:100vh;

    background:#000;

    overflow:hidden;

    scroll-snap-align:start;
}

/* =========================
   PLAYER
========================= */

.player-shell{
    position:absolute;
    inset:0;
    overflow:hidden;
    background:#000;
}

.player-shell iframe{
    position:absolute;

    top:50%;
    left:50%;

    width:56.25vh;
    height:100vh;

    transform:
        translate(-50%,-50%);

    border:none;

    pointer-events:none;
}

@media (max-aspect-ratio:9/16){

    .player-shell iframe{

        width:100vw;
        height:177.78vw;

    }

}

/* =========================
   SEARCH HEADER
========================= */

.search-header{

    position:fixed;

    top:0;
    left:0;
    right:0;

    z-index:1000;

    padding:
        env(safe-area-inset-top)
        14px
        14px
        14px;

    background:
        linear-gradient(
            to bottom,
            rgba(0,0,0,.55),
            transparent
        );

    pointer-events:none;
}

.search-shell{

    width:100%;
    max-width:650px;

    margin:0 auto;

    display:flex;
    align-items:center;
    gap:12px;

    padding:12px;

    border-radius:24px;

    pointer-events:auto;

    background:
        rgba(0,0,0,.40);

    backdrop-filter:
        blur(15px);

    -webkit-backdrop-filter:
        blur(15px);

    border:
        1px solid rgba(255,255,255,.12);

    box-shadow:
        0 10px 40px rgba(0,0,0,.35);
}

.search-input{

    flex:1;

    border:none;
    outline:none;

    background:transparent;

    color:white;

    font-size:15px;
    font-weight:500;

    min-width:0;
}

.search-input::placeholder{

    color:
        rgba(255,255,255,.65);

}

.search-btn{

    width:44px;
    height:44px;

    border:none;

    border-radius:50%;

    color:white;

    cursor:pointer;

    font-size:18px;

    display:flex;
    align-items:center;
    justify-content:center;

    transition:
        transform .15s ease,
        background .15s ease;

    background:
        rgba(255,255,255,.10);

    backdrop-filter:
        blur(15px);

    -webkit-backdrop-filter:
        blur(15px);

    border:
        1px solid rgba(255,255,255,.12);
}

.search-btn:active{

    transform:scale(.9);

}

/* =========================
   SEARCH HISTORY
========================= */

.search-history{

    position:fixed;

    top:86px;
    left:50%;

    transform:translateX(-50%);

    width:calc(100% - 28px);
    max-width:650px;

    z-index:998;

    display:flex;
    flex-wrap:wrap;

    gap:10px;

    padding:12px;

    background:
        rgba(0,0,0,.32);

    backdrop-filter:
        blur(15px);

    -webkit-backdrop-filter:
        blur(15px);

    border:
        1px solid rgba(255,255,255,.10);

    border-radius:20px;
}

.history-chip{

    border:none;

    padding:
        10px 14px;

    border-radius:999px;

    cursor:pointer;

    color:white;

    font-size:13px;
    font-weight:600;

    background:
        rgba(255,255,255,.10);

    backdrop-filter:
        blur(15px);

    -webkit-backdrop-filter:
        blur(15px);

    border:
        1px solid rgba(255,255,255,.10);

    transition:
        transform .15s ease,
        background .15s ease;
}

.history-chip:hover{

    transform:scale(1.04);

    background:
        rgba(255,255,255,.16);

}

/* =========================
   SOUND OVERLAY
========================= */

.sound-overlay{

    position:fixed;

    top:150px;
    left:50%;

    transform:
        translateX(-50%);

    z-index:9999;

    padding:
        12px 18px;

    border-radius:999px;

    background:
        rgba(0,0,0,.40);

    backdrop-filter:
        blur(15px);

    -webkit-backdrop-filter:
        blur(15px);

    border:
        1px solid rgba(255,255,255,.12);

    color:white;

    font-size:14px;
    font-weight:600;

    letter-spacing:.2px;

    box-shadow:
        0 10px 40px rgba(0,0,0,.35);

    transition:
        opacity .4s ease,
        transform .4s ease;

    pointer-events:none;
}

.sound-overlay.hidden{

    opacity:0;

    transform:
        translateX(-50%)
        translateY(-15px);

}

/* =========================
   FLOATING SCROLL
========================= */

.scroll-controls{

    position:fixed;

    right:14px;
    top:50%;

    transform:
        translateY(-50%);

    z-index:999;

    display:flex;
    flex-direction:column;

    gap:14px;
}

.scroll-btn{

    width:58px;
    height:58px;

    border-radius:50%;

    border:
        1px solid rgba(255,255,255,.12);

    background:
        rgba(0,0,0,.42);

    backdrop-filter:
        blur(15px);

    -webkit-backdrop-filter:
        blur(15px);

    color:white;

    display:flex;
    align-items:center;
    justify-content:center;

    cursor:pointer;

    font-size:24px;

    transition:
        transform .18s ease,
        opacity .18s ease;

    box-shadow:
        0 0 30px rgba(255,255,255,.08),
        0 10px 30px rgba(0,0,0,.45);
}

.scroll-btn:hover{

    transform:
        scale(1.08);

}

.scroll-btn:active{

    transform:
        scale(.92);

}

@media(max-width:768px){

    .scroll-controls{

        right:10px;
        top:auto;
        bottom:140px;

        transform:none;
    }

    .scroll-btn{

        width:52px;
        height:52px;

        font-size:20px;
    }

}

/* =========================
   TAP FEEDBACK
========================= */

.tap-feedback{

    position:absolute;

    top:50%;
    left:50%;

    transform:
        translate(-50%,-50%)
        scale(.8);

    width:92px;
    height:92px;

    border-radius:50%;

    display:flex;
    align-items:center;
    justify-content:center;

    background:
        rgba(0,0,0,.42);

    backdrop-filter:
        blur(18px);

    -webkit-backdrop-filter:
        blur(18px);

    border:
        1px solid rgba(255,255,255,.12);

    color:white;

    font-size:42px;

    z-index:30;

    opacity:0;

    pointer-events:none;

    transition:
        opacity .22s ease,
        transform .22s ease;
}

.tap-feedback.show{

    opacity:1;

    transform:
        translate(-50%,-50%)
        scale(1);

}

/* =========================
   VIDEO TAP AREA
========================= */

.video-tap-layer{

    position:absolute;

    inset:0;

    z-index:4;

}

/* =========================
   GRADIENTS
========================= */

.top-gradient{

    position:absolute;

    top:0;
    left:0;
    right:0;

    height:180px;

    z-index:2;

    background:
        linear-gradient(
            to bottom,
            rgba(0,0,0,.78),
            transparent
        );
}

.bottom-gradient{

    position:absolute;

    left:0;
    right:0;
    bottom:0;

    height:48%;

    z-index:2;

    background:
        linear-gradient(
            to top,
            rgba(0,0,0,.97),
            rgba(0,0,0,.65),
            transparent
        );
}

/* =========================
   META
========================= */

.meta{

    position:absolute;

    left:16px;
    bottom:95px;

    width:
        calc(100% - 120px);

    z-index:5;

    color:white;

    padding:14px;

    border-radius:22px;

    background:
        rgba(0,0,0,.40);

    backdrop-filter:
        blur(15px);

    -webkit-backdrop-filter:
        blur(15px);

    border:
        1px solid rgba(255,255,255,.10);

    box-shadow:
        0 10px 30px rgba(0,0,0,.35);
}

.channel{

    font-size:14px;
    font-weight:700;

    margin-bottom:10px;

    opacity:.92;

    text-shadow:
        0 2px 10px rgba(0,0,0,.7);
}

.title{

    font-size:18px;
    line-height:1.45;
    font-weight:800;

    display:-webkit-box;

    -webkit-line-clamp:2;
    -webkit-box-orient:vertical;

    overflow:hidden;

    text-overflow:ellipsis;

    text-shadow:
        0 2px 14px rgba(0,0,0,.9);
}

/* =========================
   SIDEBAR
========================= */

.sidebar{

    position:absolute;

    right:12px;
    bottom:95px;

    z-index:50;

    display:flex;
    flex-direction:column;

    gap:18px;
}

.action{

    display:flex;
    flex-direction:column;

    align-items:center;

    gap:7px;

    user-select:none;
}

.action-btn{

    width:58px;
    height:58px;

    border-radius:50%;

    display:flex;
    align-items:center;
    justify-content:center;

    background:
        rgba(0,0,0,.40);

    backdrop-filter:
        blur(15px);

    -webkit-backdrop-filter:
        blur(15px);

    border:
        1px solid rgba(255,255,255,.12);

    box-shadow:
        0 10px 28px rgba(0,0,0,.35);

    font-size:25px;

    transition:
        transform .15s ease;

    cursor:pointer;

    color:white;
}

.action-btn:active{

    transform:scale(.88);

}

.action-label{

    font-size:12px;
    font-weight:700;

    color:white;

    text-shadow:
        0 2px 10px rgba(0,0,0,.75);
}

/* =========================
   LOADER
========================= */

.loader-screen{

    width:100%;
    height:100vh;

    display:flex;
    align-items:center;
    justify-content:center;

    background:#000;
}

.loader-ring{

    width:78px;
    height:78px;

    border-radius:50%;

    border:
        5px solid rgba(255,255,255,.08);

    border-top:
        5px solid white;

    animation:
        spin .8s linear infinite;

    position:relative;
}

.loader-ring::after{

    content:"";

    position:absolute;

    inset:-10px;

    border-radius:50%;

    border:
        2px solid rgba(255,255,255,.08);
}

@keyframes spin{

    to{
        transform:rotate(360deg);
    }

}

/* =========================
   ERROR
========================= */

.error{

    width:100%;
    height:100vh;

    display:flex;
    align-items:center;
    justify-content:center;

    padding:30px;

    color:white;

    text-align:center;

    font-size:18px;
    font-weight:700;
}

</style>
</head>

<body>

<div id="app">

    <!-- SEARCH -->

    <div class="search-header">

        <div class="search-shell">

            <input
                type="text"
                id="searchInput"
                class="search-input"
                placeholder="Search shorts..."
                autocomplete="off"
                spellcheck="false"
            />

            <button
                class="search-btn"
                id="searchBtn"
            >
                🔍
            </button>

        </div>

    </div>

    <!-- SEARCH HISTORY -->

    <div
        class="search-history"
        id="searchHistory"
    ></div>

    <!-- SOUND -->

    <div
        class="sound-overlay"
        id="soundOverlay"
    >
        Tap Screen For Sound 🔊
    </div>

    <!-- FLOATING SCROLL -->

    <div class="scroll-controls">

        <button
            class="scroll-btn"
            id="scrollUp"
        >
            ↑
        </button>

        <button
            class="scroll-btn"
            id="scrollDown"
        >
            ↓
        </button>

    </div>

    <!-- FEED -->

    <div id="feed">

        <div class="loader-screen">

            <div class="loader-ring"></div>

        </div>

    </div>

</div>

<!-- SUPABASE -->

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<!-- YOUTUBE -->

<script src="https://www.youtube.com/iframe_api"></script>

<script>

/* ==========================================
   SECURITY CONFIGURATION
========================================== */

/*

⚠️ IMPORTANT SECURITY WARNING

NEVER SHARE THIS FILE PUBLICLY
IF THESE VALUES CONTAIN REAL KEYS.

For production:
- Use environment variables
- Use a backend proxy
- Restrict your YouTube API key
- Restrict your Supabase Auth settings

*/

const SUPABASE_URL =
    "https://cfmdniuossejstrywbbx.supabase.co";

const SUPABASE_ANON_KEY =
    "sb_publishable_W0tVnUX_Nju1OVAipUCoHQ_EmjUAQ7T";

/* ==========================================
   YOUTUBE CONFIG
========================================== */

const API_KEY =
    "AIzaSyBeL88mCyBYNZAnxPQ4sExqTo1HjTjQ_Oc";

const MAX_RESULTS = 50;

/* ==========================================
   SUPABASE CLIENT
========================================== */

const supabase =
    window.supabase.createClient(
        SUPABASE_URL,
        SUPABASE_ANON_KEY
    );

/* ==========================================
   ELEMENTS
========================================== */

const feed =
    document.getElementById("feed");

const soundOverlay =
    document.getElementById(
        "soundOverlay"
    );

const searchInput =
    document.getElementById(
        "searchInput"
    );

const searchBtn =
    document.getElementById(
        "searchBtn"
    );

const scrollUp =
    document.getElementById(
        "scrollUp"
    );

const scrollDown =
    document.getElementById(
        "scrollDown"
    );

const searchHistoryContainer =
    document.getElementById(
        "searchHistory"
    );

/* ==========================================
   STATE
========================================== */

let currentQuery =
    "anime edits";

let players = [];

let observer = null;

let activeIndex = -1;

let globalMuted = true;

let hasUserInteracted = false;

let currentUser = null;

/* ==========================================
   AUTH
========================================== */

async function initializeAuth(){

    try{

        const {
            data,
            error
        } = await supabase.auth.getUser();

        if(error){

            console.warn(
                "Supabase auth warning:",
                error.message
            );

            return;

        }

        currentUser =
            data.user || null;

    }catch(error){

        console.error(
            "Auth init failed:",
            error
        );

    }

}

/* ==========================================
   SEARCH HISTORY
========================================== */

async function saveSearch(term){

    if(!currentUser)
        return;

    try{

        await supabase
            .from("search_history")
            .insert({

                user_id:
                    currentUser.id,

                search_term:
                    term,

                timestamp:
                    new Date().toISOString()

            });

    }catch(error){

        console.error(
            "saveSearch failed:",
            error
        );

    }

}

async function fetchRecentSearches(){

    if(!currentUser)
        return [];

    try{

        const {
            data,
            error
        } = await supabase
            .from("search_history")
            .select(
                "search_term, timestamp"
            )
            .eq(
                "user_id",
                currentUser.id
            )
            .order(
                "timestamp",
                { ascending:false }
            )
            .limit(10);

        if(error){

            console.error(error);

            return [];

        }

        return data || [];

    }catch(error){

        console.error(error);

        return [];

    }

}

async function renderSearchHistory(){

    const history =
        await fetchRecentSearches();

    searchHistoryContainer.innerHTML =
        "";

    if(!history.length){

        searchHistoryContainer.style.display =
            "none";

        return;

    }

    searchHistoryContainer.style.display =
        "flex";

    const uniqueTerms =
        [...new Set(
            history.map(
                item=>item.search_term
            )
        )]
        .slice(0,5);

    uniqueTerms.forEach(term=>{

        const chip =
            document.createElement(
                "button"
            );

        chip.className =
            "history-chip";

        chip.textContent =
            term;

        chip.addEventListener(
            "click",
            async ()=>{

                searchInput.value =
                    term;

                await performSearch(
                    term,
                    false
                );

            }
        );

        searchHistoryContainer.appendChild(
            chip
        );

    });

}

/* ==========================================
   PERSONALIZED FEED
========================================== */

async function loadPersonalizedFeed(){

    const history =
        await fetchRecentSearches();

    if(!history.length){

        searchInput.value =
            currentQuery;

        await performSearch(
            currentQuery,
            false
        );

        return;

    }

    const uniqueTerms =
        [...new Set(
            history.map(
                item=>item.search_term
            )
        )];

    const randomTerm =
        uniqueTerms[
            Math.floor(
                Math.random() *
                uniqueTerms.length
            )
        ];

    currentQuery =
        randomTerm;

    searchInput.value =
        randomTerm;

    await performSearch(
        randomTerm,
        false
    );

}

/* ==========================================
   SEARCH ENGINE
========================================== */

async function performSearch(
    query,
    saveToHistory = true
){

    currentQuery =
        query.trim();

    if(!currentQuery)
        return;

    cleanupPlayers();

    showLoader();

    if(saveToHistory){

        await saveSearch(
            currentQuery
        );

        await renderSearchHistory();

    }

    try{

        const endpoint =
            `https://www.googleapis.com/youtube/v3/search` +
            `?part=snippet` +
            `&type=video` +
            `&videoDuration=short` +
            `&maxResults=${MAX_RESULTS}` +
            `&q=${encodeURIComponent(currentQuery)}` +
            `&key=${API_KEY}`;

        const response =
            await fetch(endpoint);

        const data =
            await response.json();

        if(!data.items?.length){

            showError(
                "No Shorts Found"
            );

            return;

        }

        renderFeed(data.items);

    }catch(error){

        console.error(error);

        showError(
            "Failed To Load Videos"
        );

    }

}

/* ==========================================
   RENDER FEED
========================================== */

function renderFeed(videos){

    feed.innerHTML = "";

    activeIndex = -1;

    players = videos.map(video => ({

        id:
            video.id.videoId,

        player:
            null,

        initialized:
            false,

        destroyed:
            false

    }));

    videos.forEach((video,index)=>{

        const section =
            document.createElement(
                "section"
            );

        section.className =
            "video-section";

        section.dataset.index =
            index;

        section.innerHTML = `

            <div class="player-shell">

                <div id="player-${index}"></div>

            </div>

            <div
                class="video-tap-layer"
                data-tap-layer="true"
            ></div>

            <div
                class="tap-feedback"
                id="feedback-${index}"
            >
                ▶
            </div>

            <div class="top-gradient"></div>

            <div class="bottom-gradient"></div>

            <div class="meta">

                <div class="channel">
                    @${escapeHTML(
                        video.snippet.channelTitle
                    )}
                </div>

                <div class="title">
                    ${escapeHTML(
                        video.snippet.title
                    )}
                </div>

            </div>

            <div class="sidebar">

                <div class="action">

                    <div class="action-btn">
                        ❤️
                    </div>

                    <div class="action-label">
                        Like
                    </div>

                </div>

                <div class="action">

                    <div class="action-btn">
                        💬
                    </div>

                    <div class="action-label">
                        Comment
                    </div>

                </div>

                <div class="action">

                    <div class="action-btn">
                        📤
                    </div>

                    <div class="action-label">
                        Share
                    </div>

                </div>

            </div>

        `;

        feed.appendChild(section);

    });

    setupObserver();

    setupTapPlayback();

    activateVideo(0);

}

/* ==========================================
   PLAYER CREATION
========================================== */

function loadPlayer(index){

    const item =
        players[index];

    if(!item)
        return;

    if(item.initialized)
        return;

    const mount =
        document.getElementById(
            `player-${index}`
        );

    if(!mount)
        return;

    item.initialized = true;

    item.destroyed = false;

    item.player =
        new YT.Player(
            `player-${index}`,
            {

            videoId:
                item.id,

            playerVars:{

                autoplay:0,
                controls:0,
                modestbranding:1,
                rel:0,
                fs:0,
                playsinline:1,
                loop:1,
                playlist:item.id,
                mute:1,
                iv_load_policy:3,

                enablejsapi:1,

                /* FIXES CROSS-ORIGIN ERRORS */

                origin:
                    window.location.origin

            },

            events:{

                onReady:(event)=>{

                    const current =
                        players[index];

                    if(
                        !current ||
                        current.destroyed ||
                        !current.player
                    ){
                        return;
                    }

                    if(index === activeIndex){

                        try{

                            event.target.playVideo();

                            if(globalMuted){

                                event.target.mute();

                            }else{

                                event.target.unMute();

                            }

                        }catch(err){}

                    }

                },

                onError:()=>{

                    console.warn(
                        "Player error:",
                        index
                    );

                }

            }

        });

}

/* ==========================================
   PLAYER DESTROY
========================================== */

function destroyPlayer(index){

    const item =
        players[index];

    if(!item)
        return;

    if(!item.player)
        return;

    item.destroyed = true;

    try{

        item.player.stopVideo();

    }catch(err){}

    try{

        item.player.destroy();

    }catch(err){}

    item.player = null;

    item.initialized = false;

    const mount =
        document.getElementById(
            `player-${index}`
        );

    if(mount){

        mount.innerHTML = "";

    }

}

/* ==========================================
   3-PLAYER SLIDING WINDOW
========================================== */

function ensureSlidingWindow(
    centerIndex
){

    const allowedIndexes =
        new Set([

            centerIndex - 1,
            centerIndex,
            centerIndex + 1

        ]);

    allowedIndexes.forEach(index=>{

        if(
            index >= 0 &&
            index < players.length
        ){

            loadPlayer(index);

        }

    });

    players.forEach((item,index)=>{

        if(!allowedIndexes.has(index)){

            destroyPlayer(index);

        }

    });

}

/* ==========================================
   OBSERVER
========================================== */

function setupObserver(){

    if(observer){

        observer.disconnect();

    }

    observer =
        new IntersectionObserver(

        entries=>{

            entries.forEach(entry=>{

                if(
                    entry.isIntersecting &&
                    entry.intersectionRatio >= .75
                ){

                    const index =
                        Number(
                            entry.target.dataset.index
                        );

                    activateVideo(index);

                }

            });

        },
        {
            threshold:[0.75]
        });

    document
        .querySelectorAll(
            ".video-section"
        )
        .forEach(section=>{

            observer.observe(section);

        });

}

/* ==========================================
   ACTIVATE VIDEO
========================================== */

function activateVideo(index){

    if(index < 0)
        return;

    if(index >= players.length)
        return;

    if(activeIndex === index)
        return;

    activeIndex = index;

    ensureSlidingWindow(index);

    players.forEach((item,i)=>{

        if(
            !item ||
            item.destroyed ||
            !item.player
        ){
            return;
        }

        try{

            if(i === index){

                item.player.playVideo();

                if(globalMuted){

                    item.player.mute();

                }else{

                    item.player.unMute();

                }

            }else{

                item.player.pauseVideo();

            }

        }catch(err){}

    });

}

/* ==========================================
   SCROLL CONTROLS
========================================== */

function scrollToVideo(index){

    if(index < 0)
        return;

    if(index >= players.length)
        return;

    const sections =
        document.querySelectorAll(
            ".video-section"
        );

    const target =
        sections[index];

    if(!target)
        return;

    target.scrollIntoView({

        behavior:"smooth",

        block:"start"

    });

}

scrollUp.addEventListener(
    "click",
    ()=>{

        scrollToVideo(
            activeIndex - 1
        );

    }
);

scrollDown.addEventListener(
    "click",
    ()=>{

        scrollToVideo(
            activeIndex + 1
        );

    }
);

/* ==========================================
   TAP PLAYBACK
========================================== */

function setupTapPlayback(){

    const tapLayers =
        document.querySelectorAll(
            "[data-tap-layer]"
        );

    tapLayers.forEach(layer=>{

        layer.addEventListener(
            "click",
            ()=>{

                togglePlayback();

            }
        );

    });

}

function togglePlayback(){

    const current =
        players[activeIndex];

    if(!current)
        return;

    if(!current.player)
        return;

    if(current.destroyed)
        return;

    try{

        const state =
            current.player.getPlayerState();

        if(state === 1){

            current.player.pauseVideo();

            showTapFeedback(
                activeIndex,
                "⏸"
            );

        }else{

            current.player.playVideo();

            showTapFeedback(
                activeIndex,
                "▶"
            );

        }

    }catch(err){}

}

function showTapFeedback(
    index,
    icon
){

    const feedback =
        document.getElementById(
            `feedback-${index}`
        );

    if(!feedback)
        return;

    feedback.textContent =
        icon;

    feedback.classList.add(
        "show"
    );

    clearTimeout(
        feedback._timeout
    );

    feedback._timeout =
        setTimeout(()=>{

            feedback.classList.remove(
                "show"
            );

        },220);

}

/* ==========================================
   CLEANUP
========================================== */

function cleanupPlayers(){

    if(observer){

        observer.disconnect();

        observer = null;

    }

    players.forEach((_,index)=>{

        destroyPlayer(index);

    });

    players = [];

    activeIndex = -1;

    feed.innerHTML = "";

}

/* ==========================================
   SOUND
========================================== */

function enableSound(){

    if(hasUserInteracted)
        return;

    hasUserInteracted = true;

    globalMuted = false;

    soundOverlay.classList.add(
        "hidden"
    );

    const current =
        players[activeIndex];

    if(
        current &&
        current.player &&
        !current.destroyed
    ){

        try{

            current.player.unMute();

        }catch(err){}

    }

}

document.body.addEventListener(
    "click",
    enableSound,
    { once:true }
);

document.body.addEventListener(
    "touchstart",
    enableSound,
    { once:true }
);

/* ==========================================
   SEARCH EVENTS
========================================== */

async function triggerSearch(){

    const query =
        searchInput.value.trim();

    if(!query)
        return;

    await performSearch(
        query,
        true
    );

}

searchBtn.addEventListener(
    "click",
    triggerSearch
);

searchInput.addEventListener(
    "keydown",
    async e=>{

        if(e.key === "Enter"){

            await triggerSearch();

        }

    }
);

/* ==========================================
   HELPERS
========================================== */

function showLoader(){

    feed.innerHTML = `

        <div class="loader-screen">

            <div class="loader-ring"></div>

        </div>

    `;

}

function showError(message){

    feed.innerHTML = `

        <div class="error">

            ${message}

        </div>

    `;

}

function escapeHTML(str){

    return str.replace(
        /[&<>"']/g,
        m=>({

            '&':'&amp;',
            '<':'&lt;',
            '>':'&gt;',
            '"':'&quot;',
            "'":'&#39;'

        })[m]
    );

}

/* ==========================================
   APP BOOT
========================================== */

async function initializeApp(){

    await initializeAuth();

    await renderSearchHistory();

    await loadPersonalizedFeed();

}

/* ==========================================
   YOUTUBE API READY
========================================== */

function onYouTubeIframeAPIReady(){

    initializeApp();

}

</script>
