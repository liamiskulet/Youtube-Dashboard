<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>Shorts Feed</title>

<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }

    html, body {
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #000;
        font-family: Arial, sans-serif;
        color: white;
    }

    #feed {
        height: 100vh;
        overflow-y: scroll;
        scroll-snap-type: y mandatory;
        -webkit-overflow-scrolling: touch;
    }

    .video-section {
        position: relative;
        width: 100%;
        height: 100vh;
        scroll-snap-align: start;
        overflow: hidden;
        background: black;
        display: flex;
        justify-content: center;
        align-items: center;
    }

    .video-wrapper {
        position: relative;
        width: 100vw;
        height: 100vh;
        overflow: hidden;
        background: #000;
    }

    /* Fixed CSS Selectors below */
    .iframe-actor iframe {
        position: absolute;
        top: 50%;
        left: 50%;
        width: 56.25vh;
        height: 100vh;
        transform: translate(-50%, -50%);
        border: none;
        pointer-events: none;
    }

    @media (max-aspect-ratio: 9/16) {
        .iframe-actor iframe {
            width: 100vw;
            height: 177.78vw;
        }
    }

    .overlay {
        position: absolute;
        bottom: 70px;
        left: 15px;
        z-index: 5;
        max-width: 70%;
        text-shadow: 0 0 6px rgba(0,0,0,0.9);
    }

    .title {
        font-size: 17px;
        font-weight: bold;
        margin-bottom: 6px;
    }

    .channel {
        font-size: 14px;
        opacity: 0.9;
    }

    .sidebar {
        position: absolute;
        right: 10px;
        bottom: 90px;
        display: flex;
        flex-direction: column;
        gap: 20px;
        z-index: 5;
    }

    .icon-btn {
        display: flex;
        flex-direction: column;
        align-items: center;
        font-size: 14px;
        text-shadow: 0 0 5px rgba(0,0,0,0.8);
    }

    .icon {
        font-size: 28px;
        margin-bottom: 4px;
    }

    .loading {
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        color: white;
        font-size: 20px;
    }
</style>
</head>

<body>

<div id="feed">
    <div class="loading">Loading Shorts...</div>
</div>

<script src="https://www.youtube.com/iframe_api"></script>

<script>

   CONFIG
========================= */

   GLOBALS

   FETCH SHORTS
========================= */

    const url =
        `https://www.googleapis.com/youtube/v3/search` +
        `?part=snippet` +
        `&type=video` +
        `&videoDuration=short` +
        `&maxResults=${MAX_RESULTS}` +
        `&q=${encodeURIComponent(SEARCH_QUERY)}` +
        `&key=${API_KEY}`;

    try {

        const response = await fetch(url);
        const data = await response.json();

            feed.innerHTML = `
                <div class="loading">
                    No Shorts Found
                </div>
            `;
            return;
        }

        renderFeed(data.items);
